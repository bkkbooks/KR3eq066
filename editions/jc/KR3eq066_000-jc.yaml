front:
  text: 序去歲曾將教室中問答付印名曰組織學翼義蓋因所問皆不出組織一科範圍之內也此編所問各科俱有並將友人所問附入故名之曰醫語其中論說雖多臆斷然必擇前賢論說中之有合於經義者乃略採西醫學說中之可資參考者引以為答不敢妄自立說以欺人但古今醫書汗牛充棟諸家論說聚訟紛壇馬元臺哀秦張王李朱諸前賢之誤而張介賓復哀其誤並曰使余之後人又有哀余之誤者是後人復哀後人也吾曰後人復哀後人正醫學之逐漸進步也醫學之逐漸進步正社會之幸也後生可畏焉知來不勝今苟有糾吾謬而繩吾誤者豈獨吾之幸哉中華民國十年四月二十九日懶園居士序
