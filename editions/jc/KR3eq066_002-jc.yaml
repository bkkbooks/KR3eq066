body:
  text: 懶園醫語卷二懶園居士傅崇黻語錄浙江中醫專門學校學生記錄邵洧源問昔者夫子答左生問十五絡云陽絡陰絡即督脈任脈考難經二十六難云陽絡者陽蹻之絡也陰絡者陰蹻之絡也豈陽蹻之絡即督脈耶陰蹻之絡即任脈耶又考靈樞脈度篇帝問蹻脈有陰陽何脈當其數伯答以男子數其陽女子數其陰當數者為經不當數者為絡如是言之經即絡也絡即經也在男子則陽經而陰絡在女子則陰經而陽絡難經陰陽兩泊之絡皆加於十五絡中豈陰陽兩絡而一人兼全乎抑陰陽兩蹻各更有一經也答曰靈樞經脈篇以督之長強任之尾翳合十二經為十五絡者蓋以督脈為陽脈之海任為陰脈之海也故難經二十三難云絡脈十五滑氏注曰十二經加陽絡陰絡脾之大絡為十五絡亦但言陰陽而並不指為二蹻二維當時因左生疑二維吾故以督為陽任為陰答之亦宗靈樞之旨耳至於難經二十六難云陽絡者陽蹻之絡陰絡者陰蹻之絡夫男子以陰蹻為絡女子以陽蹻為絡是十五絡又分男女矣況陽蹻為足太陽之別陰蹻為足少陰之別十五絡中足太陽之別既曰飛陽足少陰之別既曰大鍾二蹻皆起跟中上行併合而濡目其與靈樞經旨更相悖矣故經釋云靈樞經脈篇明指十二經之別與督任及脾之大絡合為十五絡皆有穴名及病形治法此以二蹻當之未知何出要之醫道之始始自軒歧軒歧之旨昭諸靈素靈素之妙精確無遺後之紹此統者孰能外其範圍而世之所以紛紛者實由難經始也夫難經述靈素而作其中能發明經旨者固多而謬誤者亦不一而足學者當取其長而棄其短始勿為所惑也至於脈度篇所云蹻脈分陰陽男子數其陽女子數其陰當數者為經不當數者為絡蓋言男子之宗榮注於太陽之陽蹻女子之宗榮注於少陰之陰蹻氣之所注者為經隧氣之不榮者為絡脈耳當數不當數即宗榮之注不注注者為經不注者為絡非言陰陽二蹻各有一經各有一絡也其不能合十五絡也更明矣壽能模問靈樞衛氣篇首節末三句下行陰分復合於目故為一周之義下字疑上字之誤其陰分二字注傢俱謂是三陰之分或謂是少陰之分考邢客篇衛氣由陽入陰之處在足少陰分間然邪客篇之由少陰分間而入者是衛氣行陽度盡將由少陰之分內入於之五臟六腑也按衛氣曰行於陽者在皮膚之間分肉之中腠理部分其夜行於陰者在臟腑連綴之育膜也行陽行陰非經脈之謂以形身臟腑分別陰陽即內為陰外為陽之義可於痹論見之本篇之行於陰分者不過由此陰分上合於目復由目循太陽部分而作第二度之周行耳其一周者非五十度畢之謂乃衛氣行諸陽部分一次也夫以邪客之言觀之衛氣苟行於足少陰之分間即將由少陰而內行於五臟六腑若此陰分亦是足少陰則衛氣行陽之時安保其不循少陰而內入乎既可循少陰而內入則又何必上合於目且少陰之脈雖起於足心卻不上入於目是以知本篇陰分二字不能因其足心二字遂認為足少陰也蓋以本篇行陰上合於目二句觀之則此陰分者乃由足轉輸於目之中道也惟陰胦之脈亦起於少陰然谷之後故謂之少陰之別上內踝循股陰上腹裡而入於目衛氣由足返目之中道其在此乎況內經蹻脈之義每與衛氣有關如邪客篇大惑篇所言故生疑本篇陰分二字為陰蹻也不言陽蹻者因陽蹻下行也雖然足少陽之解亦不得盡非陰蹻固亦少陰之別不過須略示區別耳是否有當答曰子以陰分為陰蹻極有見地惟下字非上字之誤所謂下行者言下自少陰之湧泉穴而行於少陰然谷穴後之別也經文每有此等文氣不足為異蓋少陰之別為陰蹻直上屬目內眥合陽蹻而併合回還濡目故曰復合於目也昔通一子注此三句曰少陰之別為蹻脈蹻脈屬於目內眥故復合於目而交於太陽之睛明穴此其明證也至於衛氣之行於陽者在皮膚之間肌肉之中腠理之分行干陰者在臟腑之募原此說不獨見於痹論即本篇張氏玉師各注均有此說張氏云晝行於皮膚肌腠之間夜行於五臟募原之內玉師云經言衛氣先行皮膚先充脈絡是衛氣與絡脈相通也衛氣大會於風府日下一節二十一日下至尾骶內行伏沖是衛氣外行於皮膚而內行於經脈也此言衛氣入於陽明之頷脈是榮衛之行於經脈外內又不可執一而論二說於靈樞張馬合注中均有載及想已見過矣又問難經診法以寸關尺三部候之謂寸口在關之前高陽生指高骨為關於是知寸口在於高骨之前靈樞本輸篇曰太淵魚後一寸陷者中也經渠寸口中也夫魚後一寸陷中正在難經所指之寸部若經渠則似更在太淵之後矣而靈樞指經渠為寸口則正在難經所指之尺部也或謂內經之寸口指三部而言難經之寸部專指關前之寸為主然而細玩經文其所謂經渠寸口陷者中一句卻亦並未統指三部抑又何也答曰魚者肉也魚際者穴也手魚者肉與穴之通名也經云太淵魚後一寸此魚字指魚際而言經每有此等從簡之文按仰面人形圖手部注云手腕之前肥肉隆起處形如魚者統謂之魚又按十二經諸穴圖手太陰肺經注云魚際在大指本節後內側陷中赤白肉際有散脈從此穴出散於魚太淵在掌後橫紋處經渠在寸口陷中故十二經諸穴歌中手太陰經分寸歌曰列缺腕後一寸半經渠寸口陷中是太淵掌後橫紋頭魚際節後散脈舉以此為證靈樞與難經尚不相遠惟難經以關前為寸關後為尺靈樞正面人身手部注云手掌後動脈高骨處曰關關前後兩手動脈皆曰寸口是難經之所謂尺者靈樞亦指為寸口也以關前關後皆為寸則必以尺膚為尺矣此古今診法之所以不同也或謂內經之寸口指三部而言其說殆本諸此耳江廣智問按十五絡靈樞經脈篇明指十二經之別與督任之別及脾之大絡共十五絡皆有穴名及病形治法而難經以十五絡為十二經絡及陽絡陰絡脾之大絡也與靈樞經脈篇不同曩日左生曾問及此而夫子答以陽絡即督脈陰絡即任脈也然難經言陽絡陰絡即陽蹻陰蹻與督任有別今以二蹻當之未知所出乞夫子垂教焉答云所問與前日邵情源所問答左生十五絡一條大略相同即取邵生記錄觀之毋煩牟孔昭問人參本經微寒而方書多謂甘溫大補元氣陳修園則謂經言補五臟五臟屬陰放人參補陰而不宜補陽力闢回陽之說為害人非淺敢問孰是答曰古之所謂人參即今之所謂黨參也或曰性寒或曰性溫或曰味苦或曰味甘或曰補陰或曰補陽皆執一偏之見耳夫人參氣味甘而微苦為涼為溫補陰補陽均無不可全在醫生之妙用耳其為用也生則氣涼熟則氣溫味甘補陽微苦補陰氣主生物本乎天味主成物本乎地氣味生成陰陽之造化也涼者高秋清肅之氣天之陰也其性降溫者陽春生髮之氣天之陽也其性升甘者濕土化成為味地之陽也其性浮微苦者火土相生之味其性沉其氣薄者生降熟升其味薄者生升熟降如土虛火旺之病則宜生用以涼薄之氣瀉火而補土是純用其氣也脾虛肺怯之病則宜熟用以甘溫之味補土而生金是純用其味也仲景云病人汗後身熱亡血脈沉滯者及下痢身涼脈微血虛者並加人參古人治血脫者益其氣蓋血不自生陽生則陰長血乃旺矣素問云無陽則陰無以生無陰則陽無以化故補氣可用人參補血亦可用人參要在醫者之妙用耳至於經言補五臟者五臟雖屬陰然陰中有陽味甘補五臟之陽微苦補五臟之陰欲補五臟之陰陽氣血各用本臟之藥相佐使以引之可也又問黃耆世人皆謂補氣固表生用發汗炒用止汗而陳修園力非之並謂黃耆走表領他藥達表而止汗非黃耆自能止汗請問黃耆是否固表生炒是否異用答曰黃耆不特補氣固表實上中下三焦氣血表裡之藥治氣虛自汗盜汗及膚痛是表藥補腎臟之元氣是里藥治咯血和脾胃是中州之藥故好古曰黃耆為上中下內外三焦之藥也靈樞云衛氣者所以溫分肉充皮膚肥腠理而司開闔黃耆能實衛氣補三焦故稱上中下內外三焦之藥元素曰黃耆補五臟諸虛治脈弦自汗瀉陰火去虛熱無汗則發之有汗則止之能發能止全在醫家之善用亦不必拘拘於生炒也又問天麥門冬皆謂止嗽消痰而本經不言又謂天冬補中有瀉麥冬瀉中有補則張隱菴又非之敢問二冬止嗽消痰確有其效否答曰二冬皆手太陰經氣分藥而麥冬則兼入手少陰天冬則兼入足少陰氣分故嘉漠曰天麥冬併入手太陰去煩解渴止嗽消痰而麥冬兼行手少陰清心降火使肺不犯邪故曰瀉中有補而天冬兼行足少陰滋腎助元全其母氣蓋腎主津液燥則凝而為痰得潤則化治痰之本也故曰補中有瀉宗奭曰麥冬治肺熱之功為多其味苦專泄而不專收故瀉肺之伏火然肺氣欲絕者合人參五味子為生脈散又補肺中元氣之不足此即瀉中有補之明證也列仙傳赤松子服天門冬齒落更生發落復出以其入足少陰經也然亦入手太陰經氣分此即補中有瀉之明證也既補中有瀉瀉中有補則不止嗽而嗽自己不消痰而痰自去矣又問玉竹李時珍謂不寒不燥可代參耆故傳為補劑無論寒熱燥濕一概投之而張隱菴謂古方治風熱外不他用且陰病內寒此為大忌抑何說之從答曰本草經謂玉竹主中風暴熱故古方專用以治風熱張穩庵之說本乎此也時珍謂治寒熱痞瘧及一切不足之證用以代參耆不寒不燥大有殊功不止去風熱並云古方治風熱外不他用者實昔人所未闡也按玉竹與黃精同類根似黃精而小異服食家亦用之故黃精久服能輕身辟穀稽神錄有士家婢服之能舉身凌空若飛鳥者玉竹雖不及黃精然服之亦有輕身不老之效然則時珍之說非無稽焉又問桑白皮陳修園謂經無清肺利水之言後人且謂生用大瀉肺氣宜蜜炙之然此藥忌火焉可炙其說可取否答曰經云桑白皮補虛益氣卻無清肺利水之說然別錄謂能去肺中水時珍謂長於利小水乃實則瀉其子也按桑乃箕星之精為東方生氣之神木忌火而不宜炙說亦有理又問婦人明理論云丹參一味功兼四物為補血涼血之品女科之專藥而本草經讀謂掩丹參之真功用豈明理論之言不足據乎答曰丹參能治心腹邪氣陽明寒熱積聚破症除瘕止煩滿益氣去心腹痼疾結氣腰脊強腳痹除風邪留熱風痹足軟及百邪鬼魅氣作聲音鳴吼定精養神定志通利關脈治冷熱勞骨節疼痛四肢不遂頭痛目赤溫熱狂悶及惡瘡疥癬癭贅腫毒丹毒排膿止痛生肌長肉治寒疝腹痛小兒驚癇身熱入少陰厥陰又能活血通心包絡其功效不可盡述原不僅破宿血生新血安生胎落死胎止血崩帶下調經脈治血邪為婦科之專藥已也但婦人明理論所言系但就婦科一部分而論故曰四物湯治婦人病不問產前產後經水多少皆可通用惟一味丹參散主治與之相同蓋此散能破宿血補新血安生胎下死胎止崩中帶下調經脈其功大類四物非謂丹參之效用即盡於此也又問貝母治痰嗽陳修園謂大失經旨且斥李士材貝母主燥痰半夏主濕痰為臆說然歟否歟答曰貝母氣味辛平經云治傷寒煩熱淋瀝邪氣疝瘕喉痹乳癰金瘡風痙原不僅治痰嗽然而消痰潤心肺未嘗無功按貝母乃手太陰經藥半夏乃足太陰足陽明經藥若虛勞咳嗽吐血咯血當用貝母脾胃濕熱涎化為痰久則生火痰火上攻當用半夏然則士材所謂貝母主燥痰半夏主濕痰者亦非無因特一系太陰經藥一系陽明經藥不可不知耳又問芍藥經云味昔平陳修園謂為攻下之品其言益氣者邪氣攻淨而元氣自益非能補氣也今人妄改酸寒認為斂陰之品殺人無算試取芍藥嚼之酸味何在誠然則四物湯等補方中不宜入芍藥矣蒙竊疑之答曰經云芍藥氣味苦平主治邪氣腹痛除血痹破堅積寒熱利小便止痛未有言補者故仲景桂枝湯解表之劑取其平入肺泄邪氣苦制桂之辛小建中湯治腹中急痛取其苦疏脾中邪氣及腹中之淤皆以苦平之味也自宋元以下諸家本草始發明味酸收陰氣斂逆氣和血補陰但吾曾嘗其味卻苦而不酸而後人之稱為酸者其說實本於雷公按芍藥一物有赤芍白芍草本木本之別白芍即草芍藥赤芍即木芍藥草本者色白而多脂木本者色紫而多脈無己曰白者補赤者瀉大明曰赤者補氣白者補血四物等補方中入芍藥者亦此意也又問陳修園謂梔子不能湧吐且宜生用炒黑則死灰無用俗本生則吐炒黑則不吐陋甚亦有當乎答曰本經不言梔子能湧吐梔子本非吐藥仲景用為吐藥者謂邪氣在上拒而不能納食梔子氣輕飄而上行用以導之令其吐則邪因以出所謂高者因而越之也至於炒黑者所以平其輕飄之性苦寒之味耳故仲景治傷寒發汗吐下後心煩及心經留熱小便赤澀用火煨治下利鮮血用燒灰服也又問又謂半夏乃太陰陽明少陽之藥祛痰非其專長故仲景云嘔加半夏痰多加茯苓未聞痰多加半夏竊謂痰由水濕在半夏能燥濕則未嘗不可治痰敢正之夫子答曰所見極是吾曾云脾胃濕熱涎化為痰久則生火痰火上攻當用半夏即此意也又問張隱菴謂桔梗治少陽之脅痛上焦之胸痛中焦之腸鳴下焦之腹滿又驚則氣上恐則氣下悸則動中是桔梗為氣分之藥上中下三焦皆可治也指張元素桔梗為舟楫之藥載諸藥而不沉之說為謬似屬有理答曰本草經稱桔梗治胸脅痛腹滿腸鳴驚恐本無載諸藥上浮之說元素謂引經與甘草同為舟揖之劑者以其味厚氣輕主升而不降耳故曰如大黃苦泄峻下之藥欲引之胸中至高之分須用辛甘之劑升之此蓋指引經而言非謂效即止於此也又問何首烏相傳益氣黑髭發何翁食之發白變黑故名然陳修園謂為苦澀之味何以能補不過久痢久瘧多取用之以固脫截瘧其說似亦甚當答曰首烏有赤白二種白者入氣分赤者入血分氣溫味苦澀溫補肝苦澀補腎故能收斂精氣養血益肝固精益腎健筋骨烏鬚髮為滋補之良藥功在地黃上正不僅治久痢固脫截瘧已也此藥能補本少發明自嘉靖初邵真人以七寶美髯丹方進世宗服有大效連生皇子由是何首烏方大行也江廣智問難經六十七難曰五臟募皆在陰按徐氏云六腑之募亦皆在陰是五臟六腑均有募矣肺募中府屬本經心主募巨闕屬任脈任脈明明非本經之募偏屬他經者是何原因然募之功用對於人身奚若乞夫子垂教焉答曰五臟皆有募六腑亦皆有募募皆在陰徐氏云六腑之膜亦在陰者蓋言募不以臟腑分陰陽以募俞分陰陽也人身腹為陰背為陽五臟六腑之募皆在腹故曰皆在陰五臟六腑之俞皆在背故曰皆在陽至於募之俞或在本經或在他經不一者亦猶臟腑之俞或在本經或在他經不一但以其氣之所出在何俞則屬何俞耳例如臟腑之俞惟膀胱在本經其餘皆不在本經也故素問通評虛實論云腹暴滿按之不下取太陽經絡者胃之俞在太陽經也至於對於人身之功用蓋募者內在各臟各腑之間而外連軀殼臟腑之位於人身也背部之氣從脊骨而輸出故臟腑之俞皆在背而夾脊兩旁腹部則募連著皮肉故氣出於腹者如肝募期門膽募日月之類是也其對於人身之功用亦猶五臟六腑之俞耳又問七十難曰經言春夏刺淺秋冬刺深而下文又言春夏各致一陰秋冬各致一陽上下文義似覺難通孰是孰非乞垂教焉答曰春氣在毫毛夏氣在皮膚故宜刺淺秋氣在分肉冬氣在筋骨故宜刺深然一於淺則成孤陽一於深則成孤陰故春夏雖刺淺初下針時必先一沉而後皆浮取一陰之氣以養陽秋冬雖刺深初下針時必先一浮而後皆沉取一陽之氣以養陰蓋春夏氣溫必致一陰以和陽氣者使不成孤陽也秋冬氣寒必致一陽以和陰氣者使不成孤陰也又問二難云自掌後橫紋至尺澤穴總計一尺一寸分一尺中一寸曰尺一寸中九分曰寸餘一寸間隔尺寸而名關但近世醫者三指按於寸關尺三部以診病人寸尺二部所按不及一寸九分而關部則過一分豈非肝膽脾胃與尺寸臟腑相混耶然今醫者猶能別肝膽脾胃臟腑之病也其故何歟答曰按難經二難所言不過就俞後分尺寸之部位與臟腑配位為診候之說不同也故丹波元澈曰此段但就其中分尺寸之位而與十八難分三部之說不同學者不可一例讀也楊注不察此理妄引諸家脈訣以傅會之並舉臟腑配位之說為診候之式不足為據以上皆丹波氏言要之診法內經與難經不同難經與脈經又不同學者宜參觀而會通不宜偏執一說宜參觀診察學講義故醫語卷一末篇論診法云從難經入門再參諸書盡其奧矣又問十難云一脈十變者均是臟干臟則脈甚腑干腑則脈微蓋因病臟者重病腑者輕也然按之陰陽五臟屬陰主靜六腑屬陽主動潔古云甲丙戊庚王謂之五陽剛也乙丁己辛癸謂之五陰柔也理當以腑干腑則脈甚臟干臟則脈微今十難所云反是非與經言病臟者重病腑者輕成一反比例耶二說不可一以貫之其故安在答曰脈甚則病重脈微則病輕十難云臟干臟則脈甚即經所言病脈者重也十難云腑干腑則脈微即經所言病腑者輕也二說本系一貫並不相悖即按之陰陽五臟屬陰而主裡六腑屬陽而主表病在表則輕病在裡則重重則脈甚輕則脈微理亦不相悖也至於天干因甲丙戊庚壬屬陽腑亦屬陽故配腑乙丁己辛癸屬陰臟亦屬陰故配臟所謂陽剛克陰柔者蓋言臟腑之相合也彼此不能剋制便成相敵相敵則不能相合惟有所剋制則陰陽相和既相和自柑合故臟腑陰陽剛柔相制乃成六合非指病之相干而言也牟孔昭問五臟別論言腦髓骨脈膽女子胞六者藏而不瀉名曰奇恆之腑胃大腸小腸三焦膀胱五者瀉而不藏名曰傳化之腑魄門亦為五臟使水穀不得久藏又曰六腑者傳化物而不藏故實而不能滿竊以膽為奇恆之府而本篇前所謂傳化之腑亦止胃大小腸三焦膀胱五者膽亦不與焉乃下文云六腑者傳化物而不藏則又明明傳化之腑有六若依馬注仍以膽胃大小腸三焦膀胱為傳化之六腑則與上文膽為奇恆之俯相刺謬矣蒙按經文五者傳化之腑下接魄門亦五臟使水穀不得久留二句似以魄門亦為一腑則井上五者適成六腑然魄門肛門也豈能為腑不然則傳化止有五腑讀書不多無以自解願夫子教之答曰五臟別論所云腦髓骨脈膽女子胞名奇恆六腑者原非六腑之數以其藏畜陰精故曰地氣所生皆稱為腑也然膽居六腑之一獨藏而不瀉與他腑異女子胞亦以出納精氣而成胎孕故此六者均稱奇恆之腑至於膽胃大腸小腸三焦膀胱之名六腑者以六腑之陽與心肝脾肺腎五臟之陰相表裡也膽稱奇恆故只有此五者包藏諸物而傳化濁氣故曰瀉而不藏因其轉輸運動故曰象天之氣是則腑雖有六而傳而不留者只有五耳至於經云魄門亦為五臟之使者言大腸與肺為表裡肺藏魄而主氣肛門失守則氣陷而神去故魄門雖諸腑糟粕所由出而臟氣升降亦賴以調故亦為五臟之使按難經四十二難云廣腸大八寸徑二寸半長二尺八寸受谷九升三合八分合之一廣腸者直腸也即肛門受大腸之谷而傳出從大便而下與大腸實異名而同類所異者受谷而不受水耳故難經胃大小腸皆言受水穀之數而獨於廣腸只言受谷而不言受水蓋水穀入大腸時已泌別汁入膀胱故廣腸受谷而不受水是又與胃大小腸不同難經此說實足補內經所不足然則以傳化物言之則肛門固與胃大小腸三者相似以臟腑之陰陽表裡言之則六腑固屬膽胃大腸小腸膀胱三焦也讀書者所當審其微而會其通要不可以詞害意也戴昌梓問五行之中土無定體寄旺於四季之末各十八日何長夏一月土又主之四季之土與長夏之土是同一土否答曰以方位而論東屬木西屬金南屬火北屬水土居四方之中央以四時而論春屬木秋屬金夏屬火冬屬水土屬長夏長夏在四時之中央即土居中中央之義也蓋土為萬物之原萬物皆生於土故金水木火皆出於土故四者之用皆非土不可土獨兼四氣之用而又寄旺於四季之末也素問南北政以土為尊居中央而統於金木水火非長夏一土四季之土又一土也故五臟所屬心屬火肺屬金肝屬木腎屬水而脾屬土者蓋以心肺在上肝腎在下脾居中州即土居中央之義也脾能輸運津液榮養四臟是即土為萬物之原獨兼四氣之用而寄旺於四季之義也豈居中州者一脾榮養四臟者又一脾哉曰然則靈樞九針論曰六腑膈下三臟應中州左右手足應四立何以中州之土又應肝脾腎及六腑旺於四季之末之土又應在左右手左右足是中州之土不但屬脾兼屬六腑及肝腎四季末之土亦不在脾而在左右手左右足也則又何哉曰此非言所屬也言所應也九針篇所言應者言人身之九竅九臟應地之九州九野九臟者即居膈之下肝脾腎及六腑合而為九也左手應立夏戊辰己巳日右手應立秋戊申巳未日左足應立春戊寅己丑日右足應立冬戊戌己亥日者蓋立夏為東南巽方節氣立秋為西南坤方節氣立冬為西北乾方節氣立春為東北艮方節氣四支各應一方節氣也中州即中央戊已土太乙所在之日即土旺用事之日為四季之末諸戊已日皆屬土實為中宮之辰故其氣相應均不可刺故曰六腑膈下三臟應中州其大禁大禁太一所在之日及諸戊已日凡此九者善候八正所在之處所主左右上下身體有癰腫者欲治之無以其所值之日潰治之是為天忌日也此蓋指節氣所應之日禁刺而言與所屬不同也曰土之義生己明矣素問天元紀大論云木火土金水火地之陰陽也然則火亦有二火同乎否乎曰是不同也六氣以少陰為熱火少陽為暑火六經以心臟為君火以膀胱為相火故素問天元紀大論曰寒暑燥濕風火天之陰陽也三陰三陽上奉之木火土金水火地之陰陽也生長化收藏下應之又曰君火以明相火以位然則二火固多有所司也曰王注云君火在相火之右但立名於君位不立歲氣以名奉天故曰君火以名守位稟命故曰相火以位然則君相雖有二火君火只有虛名而已雖二火猶一火耳曰此實王太僕注經之誤不足為訓也經文明明是一個明字王氏將明字改作名字實不免有改字解經之謬推原其謬實因至真要大論云少陰不司氣化遂以君火不立歲氣抑知所謂不司氣化者謂君火不主五行之化非指六氣而言也即如子午之歲上見少陰則六氣分主天地各有所司何嘗不立歲氣張氏云以火觀之其氣質上下亦有君相明位之辨斷難將君相合而為一蓋天地間萬物莫不有氣質之分明者光也乃火之氣位者形也乃火之質即如一寸之燈光被滿室氣為之也盈爐之炭有熱無焰質為之也夫焰與質雖皆是火然則焰司其光質司其熱焰主乎動質主乎靜焰在於上質在於下上下各有所主即動靜各有所司是以群火主動而在上為日光之明以昭彰天道故在人屬心神明出焉相火主靜而在下為源泉之溫以生養萬物故在人屬腎元陽蓄焉烏得謂無別乎曰然則天一之水與地六之水有別乎曰此蓋指生成而言非天一一水地六又一水也蓋一二三四五為天之數六七八九十為地之數故曰天一生水地六成之天二生火地七成之天三生木地八成之天四生金地九成之天五生土地十成之此即所謂天數五地數五也例如今年壬戌歲太陽寒水司天太陰濕土在泉中運太角故素問六元正紀大論曰寒化六風化八雨化五蓋以司天為太陽六者水之成數也中運為太角八者木之成數也在泉為太陰五者土之生數也曰生聞一三五七九為陽為天二四六八十為陰為地何也曰此乃河圖天地之交也蓋一三七九數之奇也奇為陽天之象二四六八數之偶也偶為陰地之象故河圖之數起一六陽生正北為一數陰極正北為六數陽長正東為三數陰絡正東為八數陽盛正南為七數陰生正南為二數陽極正西為九數陰盛正西為四數五與十居中陰在外而陽在內此即易所謂天地之交也曰生聞醫理通於易理已於河圖見之矣敢問洛書之通於醫理者何如曰洛書之數起於一例如去年辛酉之歲陽明燥金司天少陰君火在泉中運少羽歲水不及六元正紀大論曰災一宮一為洛書所起之數應在北方是也明年癸亥之歲厥陰風木司天少陽相火在泉中運少徵歲火不及六元正紀大論曰災九宮九為洛書陽盛之方應在南方是也參看下列諸圖邵洧源問急者收急也緩者弛緩也觀中風門張石頑之論口眼喎斜云左寒右熱則左急而右緩右寒左熱則右急而左緩以寒則收縮故急熱則弛縱故緩其所以用桂枝酒煎搽之者使寒者熱而得其平急者緩而如其常也然其云左喎搽右右喎搽左者不知其意之所在夫左喎者左寒而右熱左急而右緩也右喎者右寒而左熱右急而左緩也既左寒矣急矣喎矣反搽其右右寒矣急矣喎矣反搽其左熱反搽之寒反聽之豈有是理哉況其急也收縮也非其力止能收縮如是以彼側之筋已緩矣弛縱矣不能再緩再弛縱故止能收縮如是而已若再用桂枝酒煎搽彼側蓋加其熱度使無可緩而再緩而可弛縱而再弛縱則此急也更急收縮也更收縮緩緩急急縮其急而弛其緩此生之所以不知其意之所在也若欲從陰引陽從陽引陰益他處之熱度使之得傳達至此而緩之熱之則搽其與收縮部相近之處可也何必搽彼側益其熱度而使緩者更緩急者更急乎抑此乃一定不易之秘法萬試萬驗之定律無可以推之也生不才譾陋敢請夫子明教答曰經云左右者陰陽之通路左為陽右為陰陰出於陽陽入於陰左右相交故曰陰陽之道路也經又云陰勝則陽病陽勝則陰病陰勝陽故陽急而陰緩陽勝陰故陰急而陽緩然則陽病宜治其陰陰病宜治其陽也明矣桂枝酒之效用不在溫熱而在發散流通蓋桂枝性味辛甘發散酒能通行經絡故其發散流通能使急者舒而緩者收不然仲景用桂枝湯治太陽中風陽浮陰弱發熱頭痛之症何以無熱熱之禍耶陽勝則陰病以辛甘發散治其勝而血脈流通陰病自去陰勝則陽病以辛甘發散治其勝而血脈流通陽病自去故左喎所以搽右右喎所以搽左也經云厥陰司天風氣大來木之勝也民病眩轉目不識人善暴僵仆然則屬於風者無論外感內傷表證里證皆木邪也木鬱宜散故寒宜發散熱亦宜發散與治熱用寒治寒用熱之法自不同也曰夫子所言生益滋惑矣張石頑云左寒右熱則左急而右緩右寒左熱則右急而左緩以風氣剛勁寒冷非凡故中處則寒則急不中處則熱則緩中處則邪盛而正氣皆被逐故寒故急不中處則邪無而彼側之正氣又歸之故熱故緩則寒而急處為邪盛熱而緩處為正足也明矣夫子云陰勝陽故陽急而陰緩陽勝陰故陰急而陽緩可見此勝者正氣勝也陰勝陽陰之正勝於陽即陽之邪勝於陰故陽急而陰緩陽勝陰陽之正勝於陰即陰之邪勝於陽故陰急而陽緩又云辛甘發散治其勝不知何意也夫勝既為正氣之勝復用辛甘發散之品治其勝是否殺其正氣俾風邪自彼及此使其平均而求其愈耶抑過意犯緩緩急急之例俾急者更急緩者更緩欲演其復極必反矯枉過正之妙耶若是從陰引陽從陽引陰生於前問已詳載利弊即勝為邪勝非散其正乃散其邪何以邪勝處反熱反緩無邪處反寒反急即以邪克經絡遏郁陽氣故陰勝者則陰熱而緩陽無邪故較寒以彼緩故此急但熱者陽氣所到故也寒者陽氣不到故也經云陽之氣精以養神柔以養經經既得其所養豈有縱而不能收之理哉況傷寒太陽經雖如大青龍亦無經緩之症陽明經雖如白虎湯亦無經緩之症惟邪遏發熱者有之熱而狂叫奔走者有之熱而經縱者未聞也且縱而漢有收者尤未聞也故不知何意還乞詳示答曰正有陰陽左右邪亦有陰陽左右經曰陽勝陰病陰勝陽病固指正氣言然曰重陰必陽重陽必陰蓋言邪之所中亦如是也夫人之一身左為陽右為陰經脈十二左右各有一行中風口喎斜系由手足陽明二經中邪所致手陽明之經挾口交人中足陽明之經環唇交承漿以左脈交右右脈交左而會太陽之經絡目故也然經分左右口眼左右亦隨之而分經脈左右相交風為木邪勁而善走中於左脈者或溜於右脈中於右脈者或溜於左脈亦猶張石頑所謂中於陰則溜於腑中於陽則溜於經也腑為臟之表屬陽經為血之道屬陰且不特此也經脈左右相交口眼亦左右互應或有邪中於左脈而病應於右口眼者或有邪中於右脈而病應於左口眼者雖同一陽明經之中邪而病之久暫淺深輕重不同又不可執一而論也左中寒則逼熱於右故左急而右緩右中寒則逼熱於左故右急而左緩此病之原因也寒邪中左此陽之邪勝正也溜於陰則右之寒反逼熱於左矣故陰急而陽緩寒邪中右此陰之邪勝正也溜於陽則左之寒反逼熱於右矣故陽急而陰緩此病之變象也治現象則見病治病治原因則循流溯源治以馬膏摹其急者治現象也用桂枝酒塗其緩者治原因也故張石頑云塗其緩以和營衛以通經絡治風痹通節竅此即吾所謂辛甘發散以治勝也夫正之陰陽即內經之以陰陽分血氣左右言輕重也邪之陰陽則左或溜於右右或溜於左左或應干右右或應干左無定所亦即張石頑所謂邪之中於人無有常也至於子謂未見熱症有經縱不收者子不見靈樞經所言足陽明之筋病頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收非即指此症乎要之法死者也人活者也以活人用死法誠不可膠柱而鼓瑟也杜觀瀾問筆花醫鏡謂心包絡屬左寸難經則謂小腸屬左寸筆花醫鏡謂大腸屬右尺而難經則謂屬右寸而謂命門三焦屬右尺膀胱腎屬左尺畢竟醫鏡誤耶難經誤耶答曰心包絡即膻中膻中固候在左寸腎膀胱固候在左尺三焦命門固候在右尺也至於大腸候在右尺亦候在右寸也小腸候在左寸亦候在左尺也故診脈精要云左寸心膻中小腸左關肝膽左尺腎膀胱小腸右寸肺胸中大腸右關脾胃右尺命門三焦大腸五臟六腑之脈皆屬於一部惟大腸小腸則候於寸一部亦候於尺一部也曰何故曰臟腑配脈有因位次高下而分配各部者有因表裡相合而同配一部者例如心肺居上故均配在寸脾胃肝膽居中故均配在關腎膀胱大小腸居下故均配在尺此因位次高下而分配各部也肝與膽相表裡故同配在左關腎與膀胱相表裡故同配在左尺心與小腸相表裡故又同配在左寸肺與大腸相表裡故又同配在右寸小腸大腸之配於左右寸者因表裡之關係也小腸大腸之又配於左右尺者以小腸大腸之位皆居下也故診脈法云肺之腑大腸肺居右關上寸部大腸宜配於右關下尺部亦有時診於右寸者以肺與大腸相表裡氣之相合也小腸從心配左寸小腸亦配在左尺以心與小腸雖相表裡心位於上小腸位於下也曰左手為陽右手為陰血陰也氣陽也心主血肺主氣心脈在左手肺脈在右手觀於此則右手似屬陽左手似屬陰生於此中尚有積疑曰脈之分配上下左右者各以其類也寸脈為陽為上尺脈為陰為下心肺所居之位最上故皆配寸也其分左右者則以水為天一水生木木生火天陽也火亦陽也心為火故配左寸火為地二火生土土生金地陰也金亦陰也肺為金故配右寸由此類推火為木所生木為水所生故肝膽配左關腎膀胱配左尺金為土所生土為火所生故脾胃配右關三焦命門均配右尺也曰華岫云論脾胃謂遇稟質木火之體雖患燥熱之症亦不可以耆朮升藥治之然人既病矣脈即變矣又何以知其平時脈素稟木火之體曰脾胃患燥熱症者病之輕重可察右關脈象而知如素稟木火之體者脈必兼見於左寸關二部蓋右關候脾胃左寸候心左關候肝心屬火肝屬木也其他皆可類推矣呂文華問一男子左半身瘦弱小溲深黃色多痰稍煩即頭昏但不咳久服魚肝油無效究竟是否肺病抑或他病宜用何藥答曰此係左六陽經病似由風濕所致久恐成痹宜用搜風散濕之藥魚肝油非所宜也不如用豨薟膏曰又有一婦人年四十餘去冬右膝忽腫難以行步針灸家云是膝腫痹積久不愈恐成鶴膝癰瘓等症遂於膝彎刺二針初針出黃水少許後刺出烏血少許腫已漸消而膝彎之筋尚不能伸屈宜何藥處治曰此係足三陰虧損寒濕外邪乘虛內侵之症針刺後腫即消筋尚不能伸屈內治宜用大防風湯加減以祛風順氣活血壯筋外治用蔥熨法以助氣血而行壅滯張雨亭問組織脈道從腕上而行者僅肺小腸心包絡三焦四者而已何十二經之脈皆從寸口決耶雖手太陰之動脈在寸口而其與十二之脈究有若何之關係而皆決於此乎答曰肺為諸臟之上蓋主通陰陽十二經皆會於手太陰寸口故難經云寸口者脈之大會也胃為水穀之海五臟六腑之大源其清氣上注於肺肺氣從手太陰而行是以五臟六腑之氣味皆出於胃而見於氣口故玉機真藏論曰臟氣胃氣乃至於手太陰也營氣循十二經而行始於手太陰肺終於足厥陰肝而復會於手太陰肺經之寸口此十二經病所以皆見於寸口故難經云寸口可以決五臟六腑死生吉凶也素問經脈別論曰氣口成寸以決死生靈樞經脈篇曰其虛實也以氣口知之脈隨呼吸日行五十度而周於身營衛行陽二十五度行陰亦二十五度為一周五十度復大會於手太陰寸口所以為五臟六腑之終始故靈樞營衛生會篇曰五十而復大會又曰谷入於胃以傳之肺五臟六腑皆以受氣故難經云寸口者五臟六腑之終始也曰肺既為諸臟之華蓋寸口既為百脈之所會則但診寸口可也何以其中又分寸關尺以配各臟之所屬耶曰寸口為脈之大會者言此脈可以決死生吉凶也故難經一難曰寸口為脈之大會獨取以決五臟六腑之死生吉凶也至於審證則各臟有各臟之病各腑有各腑之病自不能不就寸關尺三部以診察何臟何病何腑何病然後因病施治耳三部配各臟之所屬豈可置不顧耶程民佐間寸關尺三部之脈有同時數者有同時遲者有彼此遲數不同者例如脈從寸至尺本系一貫寸數則關尺亦數寸遲則關尺亦遲何以有寸尺脈遲而關獨數者或尺寸脈數而關獨遲者其故何也答曰脈有寸關尺三部三部各有浮中沉九候寸關尺三部脈同是一條數則俱數遲則俱遲是無遲數之分然浮中沉三部有輕重之異故診脈法云脈是血管氣附脈行血管外是氣道脈之跳動出於心血之起落脈管中血之所主心主火血虛火少則動遲血多火旺則動數脈管只是一條動則俱動故無遲數之分氣則上下異其輕重也故浮中沉有三部之別從此類推而血管分診合診脈自有別矣曰三陰之脈經言厥陰為一陰少陰為二陰太陰為三陰而難經七難中徐大椿注言太陰為陰之始少陰為二陰厥陰為陰之至二說不同其故何也曰經言三陰者指氣有多少而言也難經之言三陰者指脈之王時而言也一言氣一言脈迥然有別何能強同按天元紀大論曰左右者陰陽之道路水火者陰陽之徵兆金木者生成之終始氣有多少形有盛衰上下相召而損益彰王冰注云氣有多少者謂厥陰為一陰少陰為二陰太陰為三陰三等不同秩也蓋厥者盡也絕也厥陰為陰之盡絕故為一陰少陰為陰之初生故曰二陰太陰為陰之已盛故曰三陰所以素問陰陽離合論云厥陰為闔少陰為樞太陰為開蓋言厥陰者一陰也為陰之盡故其義為闔太陰者三陰也為陰之外故其義為開少陰者二陰也為陰之中故其義為樞非開則無所出非闔則無所入非樞則無所主此三等之所以不同秩也至於難經七難所云太陰之至緊大而長少陰之至緊細而微厥陰之至沉短而敦指三陰之王脈而言也又云復得甲子太陰王復得甲子少陰王復得甲子厥陰王指三陰之王時而言也蓋歲半以上為天為陽歲半以下為地為陰故自正月之六月王在三陽自七月之十二月王在三陰所以太陰王七八兩月為陰之始乘夏後之餘陽交初秋之始陰陰氣未盛其脈緊大而長故徐注曰陰之始少陰王九十兩月為陰之二陰秋末冬初陽氣既衰陰氣已盛其脈緊細而微故徐注曰二陰厥陰王十十一兩月陰氣之盛已趨極端而將盡絕是即所為厥者盡也絕也故徐注曰陰之至張雨亭問按入之上皆成於精故易曰天一生水道家曰水是三才之母精為元氣之根本神篇曰故生之來謂之精決氣篇曰兩神相搏合而成形常先身生是謂精故人始生先成精也然其中同受精而分有男女者何也答曰中西諸醫家論說不一秘主衛生篇云男子火旺則成男女子火旺則成女說也北齊諸澄云陰血先至陽精後至則成男陽精先至陰血後至則成女又一說也李東垣云經水斷後一二日成男四五日後成女又一說也朱丹溪雲精勝血則陽為主受氣於左子宮成男精不勝血則阻為主受氣於右子宮成女此又一說也丹家雲天壬先至地癸後至成男天壬後至地癸先至成女壬癸齊至成雙胎一速一遲不成胎此又一說也西醫謂睪丸構造精液由左睪丸而出者成男由右睪丸而出者成女並云如有患花柳病之人割去其左睪丸而治愈者以後只生女不生男劇去右睪丸而治愈者以後只生男不生女此又一說也要之男生於寅女生於申即此理而推測寅為陽申為陰無非以陰陽二氣之盛衰分男女是則古人寡欲多男之說良不誣也答曰辭雖異理則通也腎生精精生髓髓上連於腦而下通脛骨之中按靈樞經脈篇云足少陰之脈出足心上腨內出膕上股貫脊屬腎經筋篇云足少陰之筋上循陰股結陰器絡十足厥陰足厥陰之別從腔上睪結於莖故腎與睪相隔雖遠而骨髓經脈經絡經筋則皆相通故靈樞經脈篇曰足少阻之別實則閉癃虛則腰痛蓋腎之部分雖在腰而其通竅於二便者上貫於腰脊而又下貫於睪丸也至於睪丸構造不過分左右為男女而已而構造之本始實在於腎此又西醫所不知也姜烈仙問一男子體氣尚盛並無病過又無痰唾每於夜寐時有所思索則其夜必夢驚其驚也似寐似醒身欲轉側作言語均不能如念其故何也答曰不寐證原因不一不能一概而論但據所問因思索而夢驚且其驚也似寐似醒此病由於臥時多思因此心氣被伐而神不守舍始則不寐繼則寐而不安以至似寐非寐身不轉動言語不能自如皆因心擾則神動神動則夢驚夢驚則神志昏昧遂有轉動言語均不自如者雖自疑為已醒實則尚在夢寐中也欲治此病當去靜中之動以養陰中之陽蓋夜睬靜也思索動也寐時屏除思索則靜中之動去矣心藏神為陽氣之宅衛主氣司陽氣之化衛氣入陰則靜靜則寐正以陽有所歸始神安而得寐此即養陰中之陽也又問一婦人平素身體薄弱喜飲茶而飯食少進月事以四十日左右為期此係何病應用何藥答曰身體薄弱有本於先天所稟者有由於勞傷所致者喜飲茶而飯食少進有因脾胃燥熱者有因脾胃虛弱者月事後期有因血虛者有因血滯者有因血瘀者丹溪曰經先期而至者血熱也後期而至者血虛也王子亨云陽太過則先期至陰不及則後期至然先期而至雖曰血熱亦有虛而挾火者亦有無火而先期至者不得概視為血熱後期而至雖曰血虛然亦有血熱而燥瘀者亦有血逆而留滯者如血熱燥瘀則不得不用清補如血逆留滯則不得不用疏利同一後期不能執一大凡身體薄弱喜飲茶而飯食少進月事後期至四十日者其體必虛而非實治宜補脾胃以資血之源養腎氣以安血之至忌用寒涼等藥飲食亦然駱祖馨問世人有癲狂病者一時癡呆無知怒罵無定忽然仆倒口角流涎而手足抽筋甚至種種驚人之態有作五畜之聲俗語謂豬癲病羊癲病是也生於豬癲一病未嘗親睹而羊癲一病則時有相見其發也即所謂忽然仆倒口角流涎作綿羊之聲久之兩目死然四肢筋抽或謂癲狂或謂癲癇及盡食而醒復如常人世有目為前生果報所致者生實不信夫稱之為病也其必由臟腑所致豈有歸於前生果報之理哉敢問此病之原因及療治法答曰癲與狂有別也難經二十難云重陽者狂重陰者癲虞庶注曰寸口為陽重見陽脈三倍以上為重陽其病狂自高賢智登高而歌棄衣而走罵詈不避親疏者為狂尺中為陰尺脈重見陰為重陰其病名為癲謂僵仆於地閉目不醒陰極陽復良久方醒此癲病也按內經言癲狂甚詳陽明脈解篇帝曰足陽明之脈病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也熱盛於身故棄衣欲走也陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也通評虛實論帝曰癲疾何如岐伯曰脈搏大滑久自己脈小堅急死不治帝曰癲疾之脈虛實何如岐伯曰虛則可治實則死邪氣臟腑病形篇曰心脈緩甚為狂笑微澀為癲疾病能篇帝曰有病怒狂者此病安生岐伯曰生於陽也陽氣者因暴折而難決故善怒也病名曰陽厥帝曰何以知之岐伯曰陽明者常動巨陽少陽不動不動而動大疾此其候也本神篇曰肝悲哀動中則傷魂魂傷則狂妄不精肺喜樂無極則傷魄魄傷則狂生氣通天論曰陰不勝其陽則脈流薄疾並乃狂陽不勝其陰則五臟氣爭九竅不通宣明五氣篇曰邪入於陽則狂邪入於陰則痹搏陽則癲疾搏陰則為瘖雖厥論曰陽明之厥則癲疾欲走呼陰陽類論曰罵詈妄行癲疾為狂然皆指癲狂兼病非一病也由此觀之狂與癲病本不同狂病常醒而多怒癲病常昏而僵仆其陰陽寒熱自有冰炭之殊至於手足抽筋作五畜之聲者癇證也癇病與癲相類惟癇則筋攣而亦為厥故大奇論曰心脈滿大癇瘛筋攣肝脈小急親瘛筋攣二陰急為癇厥故凡作五言之聲俗稱羊癲豬癲者五癇也別錄所稱五癇曰馬癇牛癇羊癇豬癇雞癇者即子所謂羊癲豬癲也此蓋因其聲相似而立名豈得因其形狀之奇而遂目為鬼怪與果報乎至於治療關係先當察其脈之陰陽以分別其病之動靜動者為狂靜者為癲為癇大凡狂病多因於火癲病多因子痰然狂病亦有因火致痰者癲病亦有痰盛兼火者小兒無狂證而有癲癇小兒之病固每因受驚而得然亦有從胎氣而得者故奇病論帝曰病安所得岐伯曰得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為癲疾也千金方云小兒之癇者三曰風癇驚癇食癇至於病因與治法病狂者或因求謀不遂思慮鬱結屈不得伸怒不得泄肝膽氣逆木火合邪此乃東方實證邪乘心則神魂不守邪乘胃則橫暴剛強治此者當以治火為先痰與氣察其微甚而兼治之可也病癲者每因於痰與氣氣逆則痰滯痰滯則經絡壅閉心竅格塞故旋暈僵仆口眼相引目精上視手足搐搦腰脊強直良久之醒此其忽病忽已者正由氣之忽逆忽順也治此者審其脈證之虛實察其痰與氣孰甚者先治之癇與癲病相類作五畜之聲雖覺奇異亦不外乎氣痰火三者為患癇者諸病源候論曰小兒之病也十歲以上為癲十歲以下為癇小兒三癇風癇因衣暖汗出風入所致初時先屈指如數而發也驚癇起於驚悸大啼而發食癇先由不哺乳而變熱後發者或先寒後熱而發者凡病先身熱掣縱驚啼叫喚而後發者脈浮者為陽癇病在六腑外應肌肉猶易治也病先身冷不掣不啼叫而病時脈沉者為陰癇病在五臟內連骨髓難治也其因不同杵氣則一然風寒外感是表證飲食內傷是里證皆未必便致神亂癲癇為病則忽昏忽厥病實在於心經及肝膽二臟或肝木膽火入心心火熾而神不守舍或痰迷心竅而神志不清大凡宜以行痰清心為主然必先審其正氣察其病邪辨其虛實酌宜療治而後用藥方無誤焉又問陳氏四十八種內有婦人有胎恐服藥有礙用灶中黃土研末以水和塗於心下及臍下干則易之數語蓋其用土之義實有不知請夫子垂教答曰灶心土亦名伏龍肝乃灶中對釜月下黃土也以近月之土得火之燒煉積久而結如石外赤中黃性味辛而微溫為婦人崩漏胎產之要藥凡橫生逆產子死腹中及胞衣不下或用酒或用醋皆可調納母腹臍中俱有神效其於妊娠尤能護胎傷寒類要載有妊娠熱病用灶心土如雞子許大一塊研末以水調服再以水調塗臍方寸干則又上此法蓋取其能治妊娠熱病又能護胎也陳氏用以塗心下臍下亦此意耳余偉問曰邪客篇云天圓地方人頭圓足方以應之此言而今人議論古人不知地球以理推之之誤而不知今人不解其理而自誤之反為古人之誤古聖人之立言豈有欺人之語天高地廣其涯不可以量聖人之所知也然天地或匾或長或方圓生固不知而人頭固知非圓也足固知非方也聖人之言方圓者圓者全也通也廣也謂天之全通廣大蓋於大地之義也方者向也敦方也四方也謂地之四方敦立之有方向也人頭圓者能全通繞環四顧之廣大故以應天足方者足之立有方向行有敦方故以應地孫真人曰智欲圓行欲方此義耳蓋此言雖不甚關於醫理今人力言其誤生惜之而悟此義敢問是否答曰讀書者不可以辭害意也按五運行大論帝曰地為下乎岐伯曰地為人之下太虛之中者也帝曰馮乎岐伯曰大氣舉之也觀此數語即可知地非方矣夫太虛者天也天猶蛋白地猶蛋黃故曰地在太虛之中天圓而大地圓而小地何以能懸於空中而不落惟天地皆圓故大氣始能環轉因有大氣之環轉以舉之始能不落故曰大氣舉之也然在天非在上地非在下蓋天包乎地之左右上下而上者為天下者亦為天地實居天之中也故帝問地為下否而岐伯答曰地為人之下太虛之中也夫以地球而論地實不在人之下實地之上有人地之下亦有人也所謂人之下者謂指人之足底而言耳子試置數蟻於圓球之上其在球上一方面之蟻足固履球其在球下一方面之蟻足亦未嘗不履球但皆以為地在足之下耳故曰地為人之下今邪客篇所謂天圓地方者亦指目所見足所履而言耳頭圓者指四面凌空足方者指足底平而履地也故邵子曰頭圓象天足方履地經不言履地而言象地者蓋言象足之履地耳此正古文辭旨深奧非若今文之辭淺而易明也不然五運行大論與邪客篇同出一人之言何以自相矛盾抑至於此乎天下本無事庸人自擾之耳又問婦人之月信平人常期而來乃胞中血海之潮信也至胞中受胎其血授之於胎及胎產後其血化之為乳汁故其月信乃不行也此理生已稍知其概矣而其產後其血何不從原道而下行而反上行為乳汁其原因何如答曰衝脈起於胞中前者並足少陰之經夾臍上行至胸中而散後者上循脊裡為經絡之海與陽明合於宗筋會於氣衝二經狙氣總聚於此蓋衝脈為血海陽明為多血多氣之府故二脈合於前陰會於氣衝而陽明為長陽明之脈其直行者從缺盆下乳內簾故婦人平時則為月信有胎則以養胎產後則化乳汁所以不從原道下行而上行為乳汁者蓋其血氣則屬衝脈與陽明而其經脈則下通前陰而上通於乳內故能下行至前陰亦能上行至乳內如不用其母之乳汁哺乳則其血仍下行而為信水因陽明衝脈二經血氣上下相通蓋亦天氣下降地氣上騰生化之機使然如六微旨大論所謂升降出入無器不有是也又問靈樞邪客篇云宗氣積於胸中五味篇云大氣之搏而不行者積於胸中命曰氣海海論篇曰膻中為氣海讀內經之義大氣宗氣之名乃變文之意耳其實是膻中一氣也而喻嘉言謂大氣宗氣膻中之氣三氣不可混為一氣何也答曰宗氣一名大氣亦名真氣即膻中之氣所謂上氣海是也內經言之詳矣本無分別夫內經所謂三氣不同者指宗營衛三氣而言耳故曰宗氣積於上焦營氣積於中焦衛氣積於下焦又云清者為榮濁者為衛營出中焦衛出下焦後人強分宗氣大氣真氣為三氣指為一不喻氏遂變其說以大氣宗氣膻中之氣為三氣徒滋惑亂耳壽能模問素問六元正紀大論丑未之紀太陰司天之政三之氣應是少陽相火用事師何以指為太陰答曰少陽主氣也太陰客氣也主氣以五行相生為序太陰濕土所以居少陽相火之後也客氣以陰陽一二三分先後為序厥陰為一陰居始少陰為二陰居次太陰為三陰居終少陽為一陽居始陽明為二陽居次太陽為三陽居終太陰濕土所以居少陽相火之前按丑未之紀初之氣主客二氣皆厥陰風木用事所以有寒去物榮之徵民病風濕之症風者主客二氣也濕者司天之氣也二之氣主客二氣皆少陰君火所以有火正物化之徵民病溫濕之症溫者主客之氣也濕者司天之氣也若三之氣則主客異氣矣主氣為少陽相火客氣乃太陰濕土客氣得司天之助主氣則退而無權其時尚在五月歲半以上天氣主之所以天政布濕而降寒隨民病寒濕之症四之氣則主氣為太陰土客氣為少陽火矣客氣之火下臨主氣主氣雖與司天合德然其時已在七月歲半以下地氣主之所以地氣騰而天氣否隔在泉之水發為寒風主客寒熱相簿故草木凝煙而白露陰布所以民病濕熱之症也以下五六氣與終之氣主客又同氣矣五之氣主客二氣皆陽明燥金用事所以慘令行而寒露下霜早降而草木黃皮腠屬金故民病皮腠也終之氣主客二氣皆太陽寒水用事所以寒大舉而霜積陰凝水堅凝而陽光不治人病關節禁固腰椎皆痛者因病在腎與膀胱因腎膀胱皆屬北方寒水以主客皆太陽寒水氣與腎與膀胱相合應故也參看下列圖表逐年主氣圖解主氣者地氣也在地成形靜而守位謂木火土金水分主四時而司地化以為春夏秋冬歲之常令者是也然主氣氣以五行相生序而太陰土所以居少陽火之後也如厥阻木之所以主初氣者以春木為方生之始也主春分前六十日有奇自鬥建醜中起至卯中止天度至此風氣乃行春木生火故少陰君火為二氣主春分後六十日有奇自鬥建卯中起至巳中止天度至此暄淑乃行君相以同氣相隨故少陽相火繼群火而為三氣主夏至前後各三十日有奇自鬥建巳中起至未中止天度至此炎熱乃行夏火生土故太陰濕土為四氣主秋分前六十日有奇自鬥建未中起至酉中止天度至此雲雨乃盛濕蒸乃作長夏之土生金故陽明燥金為五氣主秋分後六十日有奇自鬥建西中起至亥中止天度至此清氣乃行萬物皆燥秋金生水故太陽寒水為終氣主冬至前後各三十日有奇自鬥建亥中起至醜中止天度至此寒氣乃行此為一歲之主氣有常而無變者也至於年神有太少之異六步有正對之殊客氣布行天令以加臨於主氣上斯上下相召而變生矣逐年客氣圖解客氣者天氣也在天為氣動而不息乃為天之陰陽分司天在泉左右四間之六氣者是也故三陰三陽之氣更迭主時而行天令以加臨於主氣之上而為一歲之變化然客氣以陰陽先後之數為序故太陰土所以居少陽火之前也如三陰之序以厥陰為始者一陰也次少陰者二陰也又次太陰者三陰也三陽之序以少陽為始者一陽也次陽明者二陽也又次太陽者三陽也濕土一也而客氣之濕居火前主氣之土居火後雖若前後有不同而實皆處乎六者之中正以見土德之位也凡客令所至則有寒暑燥濕風火非常之化故冬有爍石之熱夏有淒滄之涼和則為生化不和則為災傷此蓋以客氣所加乃為勝制郁發之變耳故五運行大論曰五運更立各有所先非其位所邪當其位則正氣相得則微不相得則甚又曰氣有餘則制己所勝而侮所不勝氣不及則己所不勝而侮乘之己所勝輕而侮之侮反受邪侮而受邪寡於畏也此客氣有不時之加臨而主氣則只當奉行天令耳故凡客主之氣則但有勝而無復也總而言之司天通主上半年在泉通主下半年此客氣之概也析而言之則六氣各有所主此分六氣之詳也司天在上在泉在下中運居中通居一歲如司天生克中運謂之以上臨下為順運氣生克司天謂之以下臨上為逆在泉亦然順分生克之殊逆有大小之別此古人舉運氣之端倪耳若其二氣相合象變迥異千變萬化何有窮盡如四時有非常之化常外更有非常四方有高下之殊殊中又分高下百步之內晴雨不同千里之外寒暄非類故察氣候者必因諸天察方宜者必因諸地圓機之士又當因常以察變因此以察彼庶得古人未發之玄而盡其不言之妙歟丑未年主客相臨天時民病表附說此表但指丑未年太陰司天之政而言也蓋丑未之歲太阻濕土司天則太陽寒水在泉逐年客氣皆從在泉之左間起初運故本年初氣即起於在泉之左間本年在泉為太陽寒水則初之氣為厥陰風木與主氣同二之氣為少陰君火與主氣亦同三之氣則客氣之太陰濕土居少陽相火之前故客氣為太陰主氣為少陽矣四之氣則主氣之太陰濕土居少陽相火之後故主氣為太陰客氣為相火矣五之氣則客氣主氣又同為陽明矣終之氣則客氣主氣又同為太陽矣假如子午年則少陰司天陽明在泉在泉之左間為太陽即從太陽起初氣已亥年則厥陰司天少陽在泉在泉之左間為陽明即從陽明起初氣辰戌年則太陽司天太陰在泉在泉之左間為少陽郎從少陽起初氣卯酉年則陽明司夭少陰在泉在泉之左間為太陰即從太陰起初氣寅申年則少陽司天厥陰在泉在泉之左間為少陰即從少陰起初氣由而二而三而四而五而終六步依次而轉均可類推客氣與主氣相加臨則天時民病皆可觀氣而知矣程民佐問難經言脈不滿五十動而一止者是一藏無氣為腎氣先絕也生觀此篇有二者不明凡先絕之藏理當審其何藏受病則何藏之氣何能拘定一藏無氣腎氣先絕若此所云無論何藏受病皆腎氣先絕其理何也又脈不滿五十而一代者由一藏之氣已絕吸不至藏故也夫一藏之氣既絕吸不至藏則第五動當一代焉何以能至四十動而一代耶以上二者之理何以腎氣先絕何以脈不滿五十而代乞夫子明示答曰此正以何藏氣絕分別觀何藏之病也腎氣先絕者因五藏腎為最下吸氣最遠謂吸不能至腎至肝而還知腎所資不能隨諸藏之氣而上故其氣先絕也脈不滿五十而代者五十動是天地陰陽以漏刻為制度也按靈樞根結篇云一日一夜五十營以營五藏之精不應數者名曰狂生所謂五十營者五藏皆受氣持其脈口數其至也五十動而不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者五藏無氣張氏注曰五藏生於五行氣本於十干合化是以五藏不以五為數而以五十為數也曰何謂天地陰陽以漏刻為制曰一為陽之數十為陰之數天為陽地為陰故曰天地陰陽也一日一夜五十營合漏下百刻故曰以漏刻為制也王立堂問經云女子七七而任脈虛太衝脈衰地道不通天癸乃竭故形壞而無子也據經旨謂女子七七而經水斷不復懷孕矣但生曾經見女子年五十六而懷孕者其故安在答曰經言男子不過盡八八女子不過盡七七者言天地精氣皆竭於此過此以外多難生子耳倘過此精氣未竭未嘗無子人苟縱情多欲妄自斫喪致傷生化之源少年精絕而終身無子者亦有之何是異哉況是篇下文帝曰夫道者年皆百數能有子乎岐伯曰夫道者能卻老而全形身年雖壽能生子也蓋言合道之人其材力自是非常壽而生子固有出人之表不可以常數限也吳士揪問難經二十七難二十八難曰脈有七經八脈不拘於十二經比於聖人圖設溝渠通利水道以備不然天雨下降溝渠溢滿當此之時旁需妄行聖人不能圖也人脈隆盛入於八脈為不還周故十二經亦不能拘之其受邪氣畜則腫熱砭射之也徐氏注謂奇經八脈不能還周不如十二經之循環不已故一受邪氣則邪氣即無從而出惟用砭石以射之則邪氣隨血以泄病乃已也然與上文二十三難不合二十三難云人二足蹻脈從足至目長七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各長四尺五寸二四八尺二五一尺共九尺合之左右手足三陰三陽共脈十六丈二尺人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸二百七十息脈行十六丈二尺一周於身一日一夜凡一萬三千五百息脈行五十度周於身至平旦復會於手太陰榮衛之行周而復始如環無端據此而論任督二蹻其氣血何常不還周證之靈樞脈度篇任督二蹻確在十六丈二尺之內其脈度亦與此同並無奇經八脈不拘於經不還周等語難經此說其理可通乎否耶答曰難經二十七難二十八難所云不拘於十二經者指十二經隧也蓋言榮血行於經隧之中始於手太陰肺終足厥陰肝復從肝上注肺雖支別入督脈之道而正經則至畜門而終故靈樞營氣篇曰常榮無已終而復始又曰獨得行於經隧此即所謂拘於十二經而還周比於聖人圖設溝渠通利水道而奇經不與焉故注云此獨行於經隧之血而名榮氣榮於十二經脈之中始於手太陰肺終於足厥陰肝與榮衛之榮氣循度應漏之不同也是以本篇論榮氣之行外榮於十二經脈內容於五臟六腑其支者雖入於背脈仍注於肺中而任督及兩蹻不與焉以上所說俱詳組織學講義營氣運行之次篇正義中又曰其榮氣宗氣行於脈中以應呼吸漏下者行於二十四脈並任督兩躇共二十八脈以應二十八宿者也營氣宗氣行於脈中者應呼吸漏下晝夜而為五十營也此方是難經二十三難所謂合任督兩蹻十六丈二尺亦即靈樞脈度篇所謂十六丈二尺也俱詳組織學講義衛氣運行之次篇及一萬三千五百息五十營氣脈之數篇難經此數段與靈樞經旨符合惟難經言之不甚詳細耳又問成無己注傷寒論云寒則傷營風則傷衛營為血血屬陰寒為陰邪陰與陰相親以類相感故寒則傷營而脈緊衛為氣氣屬陽風為陽邪陽與陽接近以氣相從故風則傷衛而脈緩以後注傷寒論者不下數百家均從其說惟陳氏修園唐氏容川力斥其謬謂寒則傷衛衛氣閉束故脈緊風則傷營營血受傷故脈緩二說孰非孰是請夫子指示答曰寒為陰邪風為陽邪此但就表面而言其實無分陰陽也太陽為寒水之氣內合至陰而外充皮毛皮毛者衛氣居之宅也衛陽虛則招外寒故皮毛閉塞而無汗而寒乃傷衛厥陰為風木之氣內主營血而外應風邪血虛則招外風故肌肉腠理受邪而風乃傷營故論曰嗇嗇惡寒淅淅惡風嗇嗇者皮毛欲閉之狀也淅淅者肌肉欲開之狀也衛受寒故皮毛閉而惡寒皮毛閉故脈緊也營受風故肌肉開而惡風肌肉開故脈緩也其說似較為當曰成氏所謂風為陽邪寒為陰邪後世醫家盡從其說即陳修園淺注亦以風為陽邪而唐容川獨斥其非謂風應東方木在藏屬肝在卦為震肝體木陰血凝聚而成震卦上二陰爻下一陽爻陰尚且多於陽何得以專指風為陽邪且序例云桂枝下咽陽盛則斃使果風為陽邪豈可更與桂枝湯以助其陽哉唐氏此說似乎近理然考之素問至真要大論云風淫於內治以辛涼佐以苦甘以甘緩之以辛散之夫風為陽邪故曰治之以辛涼不然經何不曰治之以辛溫辛平如濕為陰邪故即曰濕淫於內治以苦熱惟其陰邪也故曰治之以苦熱惟其陽邪也故曰治之辛涼觀此則風為陽邪之說亦未可斥其非也雖然陰邪陽邪關於臨症用藥之際大有區別不可不辨此中真詮究屬何如曰風與寒實無所謂陰陽也唐氏曰鳳之與寒不得以陰陽二字截分惟寒則傷衛衛氣閉束故脈緊風則傷營營血受傷則血脈弱而動緩故脈緩此言極為有理至於至真要大論所云風淫於內治以辛涼者蓋言辛從金化風屬肝木以勝氣治之也佐以甘者隨其所利也木苦急則以甘緩之此即藏氣法時論所謂肝欲散急食辛以散之肝苦急急食甘以緩之是也此蓋指諸氣之在泉而言非指風為陽邪也又曰濕淫於內治以苦熱佐以酸淡者蓋言苦從火化濕屬脾土以燥氣治之也酸以收濕淡以利竅而滲泄其濕也此即藏氣法時論所謂脾苦濕急食苦以燥之靈樞經所謂淡利竅生氣通天論所謂味過於苦脾氣不濡是也此亦指氣之在泉而言非指濕為陰邪也包超然問溫病有伏氣有新感內經有冬傷於寒春必溫病及冬不藏精春必病溫之訓即為此立二大局其內無伏邪隨感隨發者為新感固盡人知之矣惟伏氣究伏於何處自章虛谷輩有寒邪伏於少陰鬱而化熱之說後人因之然少陰為太陽底面寒邪不先犯太陽而直入少陰已成傷寒直中陰經之證豈待春而始發其已伏未發之經過中何能安然無事且十二經氣晝夜運行不息邪任入何經勢必隨經傳變決無伏而不動者虛谷豈未之思耶夫人身陽常有餘陰常不足此丹溪名言少陰固受盛陰精之府有動於中必搖其精人不能無所動即陰不能保其不虛虛之處即容邪之處虛谷無非本此旨立言然內經只有冬傷於寒及邪藏肌膚云云並無少陰字樣肌膚更非少陰所司虛谷固宗葉氏者而葉氏之論溫病多注重於肺胃無一語牽涉少陰虛谷其師心之謂何近人於溫病證治日見發明而獨於少陰伏氣之說人莫明其是亦莫辨其非究竟虛谷之言與內經可通否肌膚二字可否即以少陰經絡解釋之此皆病理上應有之問題吾師當有以教之答曰肌膚屬氣分固非少陰所司肌膚二字似不可以少陰經絡作解釋然以經脈論手足少陰實有血氣內外之分別手少陰屬脈管內足少陰屬脈管外脈管內是血分乃心血所行之路脈管外是氣分乃腎陽化生衛氣而充達於肌膚者也腎中陽氣不能外充斯邪藏肌膚耳又問大腸脈候右寸小腸脈候左寸此脈訣之言醫家所公認乃自滑伯仁有候大小腸於兩尺之說李士材極稱是之遂予後人以岐途之惑而莫知所適從然汪氏脈訣刊誤於叔和說多有所辨正而獨於左寸候心小腸右寸候肺大腸未嘗以為非謂以腑配臟二經脈相接故同侯於一部也嘗思脈候大法以三部配三焦大小腸位居下焦則滑說兩尺之候亦據理之言而揍諸表裡經脈相接之理則叔和之言又未可厚非然尺寸不可兼診是非終有一屬其學理上之究竟還請吾師斷言之答曰臟腑配脈分位次亦從氣化心肺居上脾胃肝膽居中腎膀胱大小腸居下分位次也脾合胃為一家肝合膽為一家腎和膀胱為一家心合小腸為一家肺合大腸為一家然脾胃同居右關肝膽同居左關腎膀胱同居左尺表裡同配一部候脈自不必兼二部若心肺配寸大小腸配尺是以一家而分兩地也自不得不以寸候一家之關係尺候分居之地位故唐氏診脈精要云肺之腑大腸肺居右關上寸部大腸宜配於右關下尺部亦有時診於右寸者總以肺與大腸為一家也小腸從心配左寸小腸亦配在左尺以心與小腸雖一家心位於上小腸當從於下也又問醫案有稱脈象弦濡者弦如新張之弓弦其象為剛濡如綿絮之浮水其象為柔弦濡互見豈既剛而又柔歟若謂弦而虛軟無力為弦濡則何以不稱為弦虛但脈理深奧此中或有深義乞吾師明示以釋生疑答曰此非指兼脈而言指弦脈而言也濡之為名即軟之義隨手而沒之象也故脈訣曰濡脈細軟見於浮分舉之乃得按之即無不可混作虛脈濡脈浮軟雖與虛脈相似但虛脈形大濡脈形小顯然不同弦濡者非弦虛之謂弦軟之謂也脈經云弦而軟其病輕弦而硬其病重即此義耳非指兼脈而言故不能與弦大弦細弦數弦遲一列論程民佐問考關格二字各有岐說如難經言陽盛者為關陰盛者為格醫經原旨言人迎四盛以上為格陽寸口四盛以上關陰人迎與寸口俱盛四倍已上為關格關格之脈羸不能極於天地之精氣則死矣又云在寸為格在尺為關關則不得小便格則吐逆反四時者有餘為精不足為消應太過不足為精應不足有餘為消陰陽不相應病名曰關格靈樞終始篇曰人迎四盛且大且數名曰溢陽溢陽為外格脈口四盛且大且數名曰溢陰溢陰為內關脈度篇曰陰氣太虛陽氣不能榮故曰關陽氣大盛陰氣不能榮故曰格仲景傷寒論云寸口脈浮而大浮為虛大為實在尺為關在寸為格景岳真陰論曰關格本乎陰虛欲強陰舍陰不可以上諸書不同其理何也答曰關格一證內經如六節藏象論終始篇禁服篇脈度篇經脈篇等言之詳矣經言陰陽不和乃成關格謂人身陰陽之氣貴乎和平若陰陽偏勝以及不相泱洽則不得盡天年之期也夫邪氣居之不在於陰必在於陽邪在腑則氣留之而陽勝陽勝則陰病矣陰病則血留而陰勝陰勝則陽病矣陰勝而陽氣不榮為關陽勝而陰氣不榮為格陰氣太盛致使六陽經之脈氣不能運而入內故曰關關者關六陽之氣在外而使之不能入於內也陽氣太盛致使六陰經之脈氣不能運而出外故曰格格者格六陰之氣在內而使之不得出於外也陰陽俱盛不得相榮則陰自陰而陽自陽陰陽不相浹洽為關格必不得盡天年而夭折故曰不得盡期而死也難經雲陽盛為關陰盛為格已與經旨相背仲景云在尺為關在寸為格關則不得小便格則吐逆遂指吐逆便閉為關格症後世自叔和東垣以來皆以此相傳遂置關格一證於不問丹溪云此證多死於寒在上熱在下脈兩寸俱盛四倍以上法當吐以提其氣之橫格不必在出痰也既曰兩寸俱盛四倍以上又安得為寒在上且脈大如此則浮豁無根其虛可知尚可吐乎其謬孰甚夫內經云人迎四倍寸口者非指尺寸而言也古法人迎趺陽寸口合診乃遍診法古之三部九候與今之三部九候不同而曰吐逆者特隔食一證耳不得小便者特癃閉一證耳其與關格何涉至於陰虛一證更無論矣蓋關格一證在內經本以人迎察六府之陽寸口察五臟之陰人迎盛之四倍以上此陽明經孤陽獨見水不濟火也故曰格陽格陽者陰格於陽也氣口盛至四倍以上此太陽經元陰無主氣不歸精也故曰關陰關陰者陽關於陰也若人迎寸口俱盛至四倍以上且大且數此其陽氣不藏故陰中無陽陰氣不升故陽中無陰陰陽相離故名關格也凡陽盛於陽者似乎當瀉而陰分見陰又不可瀉陰極於陰者似乎當補而陽分見陽又不可補此證乃陽自陽而陽中無陰陰自陰而陰中無陽補之不可瀉之不能乃危極之證豈可指為膈食癃閉陰虛等症乎又問脈有三部九候三部者寸關尺也九候者三部之中各有浮中沉三候三三九候也今觀張會卿脈神章第三節中言三部九候者三部即上中下三部也部各有三候三候者天地人也上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手太陰也中部地手陽明也中部人手少陰也下部天足厥陰也下部地足少陰也下部人足太陰也故下部之候天以候肝地以候腎人以候脾胃之氣中部之候天以候肺地以候胸中之氣人以候心上部之候天以候頭角之氣地以候口齒之氣人以候耳目之氣生按此節之意心中頗有疑殆夫三中部者以候何藏受邪也寸以射上焦關以射中焦尺以射下焦是寸關尺三焦之脈位也九候者以察病氣表裡陰陽虛實寒熱也據會卿說浮中沉亦是候藏氣是一部之中非獨候一藏之氣矣譬猶尺部本腎經之脈而會卿說候肝腎脾胃三藏之氣其理何也答曰此即所謂古今診法不同也張氏之說即內經診法乃遍診全身動脈此古之所謂三部九候與今之所謂三部九候不同按素問三部九候論曰有下部有中部有上部部各有三候三候者有天有地有人也又曰上部天兩額之動脈即頷厭之分足少陽脈氣所行也上部地兩頰之動脈即地倉人迎之分足陽明脈氣所行也上部人耳前動脈即和髎之分手少陽脈氣所行也中部天手太陰也即掌後寸口動脈經渠之次肺經脈氣所發也中部地手陽明也即手大指次指岐骨間動脈合谷之次大腸經脈氣所行也中部人手少陰也即掌後銳骨下動脈神門之次心經脈氣所行也下部天足厥陰也即氣衝下三寸動脈五里之分肝經脈氣所行也下部地足少陰也即內踝後跟骨旁動脈太谿之分腎經脈氣所行也下部人足太陰也即魚腹上越筋間動脈直五里下箕門之分脾經脈氣所行也故曰下部之天以候肝此足厥陰脈故候肝也地以候腎此少陰脈故候腎也人以候脾胃之氣此足太陰脈也脾胃以膜相連故可以候脾胃之氣中部天以候肺此手太陰肺也故以候肺地以候胸中之氣此手陽明大腸脈也大小腸皆屬於胃胃脘通於胸中故以候胸中也人以候心此手少陰脈也故以候心上部天以候頭角之氣此即兩額動脈故以候額角之氣也地以候口齒之氣此即兩頰動脈故以候口齒之氣也人以候耳目之氣此即耳前動脈故以候耳目之氣也故經曰三部者各有天各有地各有人三而成天三而成地三而成人三而三之合則為九此即內經之所謂三部九候亦即張氏脈神章所謂三部九候也後世此法已廢診法即從難經以寸關尺為三部三部各有浮中沉是為九候於是有左心小腸肝膽腎右肺大腸脾胃命門之配此所謂天部人部地部者指寸關尺分上焦中焦下焦而言與內經所謂天地人不同也又問五藏之脈肝脈弦心脈鉤肺脈毛腎脈石脾脈代是五臟之平脈而難經言不滿五十而一代者是藏氣己絕其故何也答曰代脈不一各有深義雖同一名有至數之代有形體之代有氣候之代難經所謂不滿五十而一代者其說本於靈樞根結篇即動而中止不能自還也故經曰五十動而不一代者五藏皆受氣四十動一代者一藏無氣三十動一代者二藏無氣二十動一代者三藏無氣十動一代者四藏無氣不滿十動一代者五藏無氣予以短期故難經曰藏氣己絕此即至數之代也若脈本平勻而忽強忽弱者乃形體之代即平人氣象論所云者是也又若脾主四季而隨時更代者乃氣候之代即宣明五氣篇所云者是也凡脈無定候更變不常則均謂之代故經云脾脈代又邪氣藏府病形篇曰黃者其脈代皆言藏氣之常候非謂代為止也又平人氣象論曰長夏胃為耍弱曰平但代無胃曰死者乃言胃氣去而真藏見者死亦非謂代為止也即以止而論亦有分別張氏云按代脈之義自仲景叔和俱云動而中止不能自還因而復動脈代者死又曰脈五來一止不復增減者死經名曰代脈七來是人一息半時不復增減亦名曰代正死不疑故王太僕之釋代脈亦云動而中止不能自還也自後滑伯仁因而述之曰動而中止不能自還因而復動由是復止尋之良久乃復強起為代故後世以結促代並言均目之為止脈豈足以盡其義哉夫緩而一止為結數而一止為促其至則或三或五或七八至不等然皆至數分明起止有力所主之病有因氣逆痰壅而為間阻者有因血氣虛脫而為斷續者有因生平稟賦多滯而脈道不流利者此是結促之謂非代之謂也設此不明非惟失經旨之大義即於脈象之吉凶皆茫然莫知所辨何足以言診哉王善問讀十二經離合篇言經脈之外又有十五大絡大絡之外又有經別蓋十二經者手足三陰三陽也此已知之而大絡與經別生尚未知請夫子指示答曰十五大絡即十五別絡也靈樞經脈篇曰手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入魚際手少陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫心包絡心系間手太陽之別名曰支正上腕五寸內注於手少陰其別者上走時絡肩髃手陽明之別名曰遍歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合於宗脈手少陽之脈名曰外關去腕二寸外繞臂注胸中合心主足太陽之別名曰飛揚去踝七寸別走少陰足少陽之別名曰光明去踝五寸別走厥陰下足跗足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌足太陰之別名曰公孫去本節後一寸別走陽明其別者入絡暢胃足少陰之別名曰大鐘當踝後繞根別走太陽其別者並經上走於心包下外貫腰脊足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者經脛上睪結於莖任脈之別名曰尾翳下鳩尾散於腹督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂脾之大絡名曰大包出淵液下三寸布胸脅此即所謂十五大絡亦即所謂十五別絡也又靈樞經別篇曰足太陽之正別人膕中其一道下尻五寸別入於肛足少陰之正至膕中別走太陽而合足少陽之正繞髀入毛際合於厥陰別者入季肋之間足厥陰之正別跗上上至毛際合於少陽與別俱行足陽明之正上至髀入於腹裡屬胃足太陰之正上至髀與別俱行手太陽之正指地別干肩解手少陰之正別入淵腋兩筋之間屬於心手少陽之正指天別於巔入缺盆下走三焦散於胸中手心主之正別下淵液少陰之前入走肺此即所謂經別亦即所謂六合也包超然問中醫病理多拘於一藏一府一經一絡生每覽方書觸目動有可疑亦由信古之心未堅也即如吐血一證各方書於細分五藏之外更有謂由吐血而出為胃血者然六府無血胃為六府之一血從何來若謂血由他藏而注於胃由吐而出則亦不得稱為胃血若謂因胃經見證故謂胃血則所謂見證者莫外乎嘔吐口渴身熱不得臥諸證亦只可謂與胃有關況吐血見證盡人而殊未必悉屬於胃也豈可斷斷一吐字而矢口謂胃血乎西醫之論血證咸責之血管其於吐血則指為血證中之最狂暴者亦以血既至於吐其受傷必已及於動靜脈否則勢不至此夫西醫所謂動靜脈當即是中醫之衝任此生理上見解本相契合此個人意見未知然否中醫尤以衝任為血海而悉以隸之陽明陽明者胃也然則所謂胃血者將以陽明熱邪沖激衝任以致吐血又以胃統衝任故謂胃血乎然衝任所經過之處非止於胃其或因他藏之邪熱激傷衝任以致吐血亦將謂為胃血否耶抑更有所謂木強土弱胃受制克血乃由肝而轉註於胃由吐而出乃謂胃血乎然血既來自肝又烏得謂為胃血又便血尿血不論近因遠因要與大小腸膀胱有關而既本藏則皆無血又必標大小腸血膀胱血各名目其拘謹殆與胃血同生讀書少悟心迄未得充分明瞭之解釋竊以為非請諸夫子不可也至其他務名略實之說蓋不勝枚舉耳答曰失血於口者同一吐而有咽喉之異蓋上焦出納之門戶惟咽喉二竅而已咽為胃之上竅故由於咽者必出於胃喉為肺之上竅故由於喉者必出於肺然喉連於肺而實總五藏之清道咽連於胃而實總六府之濁道此其出於肺者人知病在五藏而不知出於胃者亦多由乎五藏也內經云五藏者皆稟氣於胃胃者五藏之本也五藏之氣既稟於胃五藏之病何獨不及於胃乎今見吐血輒指為胃血並曰古人云嘔者血出於胃豈知亦由於藏乎大凡胃火盛而大吐者多本腑之病至若怒則氣逆甚則嘔血者亦出於胃脘此氣逆在肝木邪乘胃所致也又如欲火上炎甚則嘔血者亦出於胃脘此火發源泉陰邪乘胃所致也凡五志之火皆能及胃而血出自咽者豈止胃病惟咳而出者必出於喉出於喉者當察五藏嘔而出者必出於咽出於咽者則五藏六府皆能及之但胃為水穀之海多氣多血之府實為衝任血海之源故凡血枯經閉者當求生血之源源在胃也吐血者當求動血之源源在藏也至於便血有由腸胃者有在廣腸肛門者有在小腸者雖同一血之妄行要不得盡指為大小腸且有脾胃陽虛而不能統血者有氣隱而血亦陷者有病久滑泄而血因以動者有風邪結於陰分而便血者安得概指為大小腸若溺血則有出於溺孔者有出於精道者出於溺孔而溺時孔道澀痛小水紅赤不利此多以酒色欲念動下焦之火固出自膀胱也如溺孔不痛而血隨溺出或痛隱於臍腹或熱見於藏府蓋小腸與心為表裡此丙火氣化之源清濁所由分無論焦心勞力或厚味酒漿而上中二焦五志口腹之火凡從清道以降者必皆由小腸以達膀胱也若出於精道之血必自精宮血海而出於命門蓋腎主水受五藏六府之精而藏之故凡勞傷五藏或五志之火致令衝任動血者多從精道而出但病在小腸者必從溺出病在命門者必從精出凡於小腹下精泄處覺有痠痛而出者即是命門之病而治法亦與水道者不同蓋水道之血宜利精道之血不宜利澀痛不通者宜利血滑不痛者不宜利也又問內經言金木水火土分配五藏人知之矣然五行由天干所化乙庚何以化金丁壬何以化木丙辛何以化水戊癸何以化火甲己何以化土而其所化之理可得而聞歟答曰按素問五運行大論云丹天之氣經於牛女戊分齡天之氣經於心尾己分蒼天之氣經於危室柳鬼素天之氣經於亢氏昂畢玄天之氣經於張翼婁胃此蓋太古占天之始察五氣紀五天而所以立五運也五天五運者謂望氣知時見丹天之火氣經於牛女壁奎四宿之上下臨戊癸之方此戊癸之所以為火運也齡天之土氣經於心尾角軫四宿之上下臨甲己之方此甲己之所以為土運也蒼天之木氣經於危室柳鬼四宿之上下臨丁壬之方此丁壬之所以為木運也素天之金氣經於亢氏昂畢四宿之上下臨乙庚之方此乙庚之所以為金運也玄夭之水氣經於張翼婁胃四宿之上下臨丙辛之方此丙辛之所以為水運也又難經三十三難云肝非為純木也乙角也庚之柔大言陰與陽小言夫與婦肺非為純金也辛商也丙之柔大言陰與陽小言夫與婦蓋言甲庚丙壬成為陽為剛己乙辛丁癸為陰為柔剛克柔惟克斯合合斯化故甲己合而化土乙庚合而化金丙辛合而化水丁壬合而化木戊癸合而化火剛柔克而陰陽合大而天地小而夫婦其理一也故五天五運解曰甲剛木克己柔土為夫婦而成土運乙柔木嫁庚剛金而成金運丁陰火配壬陽水而成木運丙陽火娶辛柔金而成水運戊陽土娶癸陰水而成火運也且不獨此也尚有月建之法十二肖之說月建者單舉正月為法假如甲己之歲正月建丙寅丙者火之陽火生土故甲己為土運乙庚之歲正月建戊寅戊者土之陽土生金故乙庚為金運丙辛之歲正月建庚寅庚者金之陽金生水故丙辛為水運丁壬之歲正月建壬寅壬者水之陽水生木故丁壬為木運戊癸之歲正月建甲寅甲者木之陽木生火故戊癸為火運也十二肖者龍居辰位鱗蟲中惟龍能興雲霧善變化凡十二幹起甲故至辰而變例如甲己干頭起甲子至辰屬戊為土故甲己變而化土乙庚干頭起丙子至辰屬庚庚為金故乙庚變而化金丙辛干頭起戊子至辰屬壬壬為水故丙辛變而化水丁壬干頭起庚子至辰屬甲甲為木故丁壬變而化木戊癸干頭起壬子至辰屬丙丙為火故戊癸變而化火也以上所言均詳運氣學講義中五行六氣上下之應篇並有圖及圖說五天五運圖圖說凡墨線所指之處即五氣所橫之處故蒼天之氣左右二線一面指危室二宿一面指柳鬼二宿即下臨丁壬之方蒼屬木故丁壬化木也素天之氣左右二線一面指亢氏二宿一面指昂畢二宿即下臨乙庚之方素屬金故乙庚化金也玄天之氣左右二線一面指張翼二宿一面指婁胃二宿即下臨丙辛之方玄屬水故丙辛化水也丹天之氣左右二線一面指牛女二宿一面指壁金二宿即下臨戊癸之方丹屬火故戊癸化火也齡天之氣左右二線一面指星尾二宿一面指角輪二宿下臨甲己之方黅屬土故甲己化土也然五運行大論丹天之氣何以不曰牛女壁奎而曰牛女戊分黅天之氣何似不曰心尾角軫而曰心尾己分蓋以乾居西北為天門天門者六戊也戊在壁奎之下戊分即壁奎也巽居東南為地戶地戶者六己也己在角軫之下己分即角軫也故經云所謂戊分已分者奎壁角軫則天地之門戶也王治華問讀喻嘉言醫門法律先哲格言謂婦人之於血也經水蓄則為胞胎及產後為惡露則去者自去生者自生其醞而為乳則無復下滿而為月矣然亦有乳育而月事時下者是否病應否服藥應用何藥答曰經血為水穀之精氣和調於五藏灑陳於六腑營養於經脈其源源而來生化於脾總統於心藏受於肝宣布於肺施泄於腎灌溉於全身在男子則化而為精女子則下歸血海上通乳竅受孕之後氣行血隨胎乃陽生陰長此即五常政大論所謂根於中者命曰神機根於外者命曰氣立也及期而產濁氣下降出為惡露清氣上升化為乳汁此即六微旨大論所謂升降出入無器不有也且不特人為然大而天地小而萬物莫不皆然故經云出入廢則神機化升降息則氣立孤危非出入則無以生長壯老已非升降則無以生長化收藏也至於有乳育而月事仍以時下者如乳子周歲而乳母經行是其常也若兒半歲而母經行有血盛血熱之分血盛者不必服藥血熱者宜涼血四物湯加續斷條苓可也若兒二三歲經不行而無疾不必眼藥若肢體倦怠食少內熱是血少也宜服逍遙散加參耆以健脾胃若以藥通之則誤矣若脾胃虛弱宜服六君子湯加當歸若兼鬱火傷脾宜服歸脾湯加丹皮山梔若怒火傷血宜服柴胡四物湯若氣血俱虛宜服八珍湯加丹皮又問讀朱丹山麻症集成謂痘先出而瘄後出者為順如瘄在痘先後要復出然則若久不出至老終當一出乎瘄麻疹之別稱答曰麻症集成所云瘄在痘先後要復出者蓋以先天后天而言也故曰痘乃先天之毒止有水火瘄乃後天之毒始備五行但二症雖分先天后天而其實無非胎毒不過因輕重而分先後耳故痘出多在幼時瘄則有在幼時出者亦有長大而出者一時傳染大小相似未有不由天行癘氣而發也曰瘄即為後天之毒何以亦屬於胎毒乎曰痘為先天之毒者其毒由胎中蘊於脾肺故其病發於手足太陰瘄為後天之毒者因產後發聲之出為後天之始當時口中含有一血塊胎毒皆蘊其中若有良醫在旁能幹未發聲前將口中血塊取出則瘄可終身不發若任其嚥下則歸於陽明故瘄之毒發於陽明而上於肺肺主氣屬皮毛是以痘毒走血分而瘄毒走氣分所走之途雖殊而所發之原則一也故曰氣為陽血為陰痘乃精血中毒故應四時之生長化收藏以合地支之數瘄乃氣分之毒是以一日三潮以應陽九之數也惟痘屬先天故發覺早瘄屬後天故發遲早不一大抵皆由天行癘氣而發其原雖屬裡而證多屬表故其內為胎毒與痘症同外有表邪與傷寒類也所以丹山麻症集成云痘先出而瘄後出者為順如瘄在痘先後要復出此亦先天后天之義歟程民佐問李東垣內外傷辨言人迎主表氣口主裡按此二語似覺欠是蓋以人迎雖在右手行陽二十五度為陽卻不能主表氣口在左手行陰二十五度為陰卻不能主裡蓋人迎為肺胸中脾胃小腸命門三焦之脈位氣口為心膻中肝膽大腸腎膀胱之脈位此十二經中皆有表裡之病何能決肺無內病而心無外病乎答曰脈訣云表脈多見於左里脈多見於右左人迎也右氣口也左手三部所主溫風寒也溫風寒病得於外故主表右手三部所主燥濕暑也燥濕暑病生於內故主裡得於外者為外邪所感故曰外感而主表生於內者為五內自傷故曰內傷而主裡以上皆脈訣言此即東垣之所以人迎氣口分內外表里也至於子所謂行陽二十五度行陰二十五度者乃衛氣運行之次日行於陽而夜行於陰此指陰陽指日夜而言非辨病之內外也王治華問醫家嘗曰寧治十男子莫治一婦人寧治十婦人莫治一孩子由是言之則男子之病當少而婦人孩子之病當多也明矣然婦孩之病不加多而男子之病未嘗少何也答曰所謂寧治十男子莫治一婦人寧治十婦人莫治一孩子者非為病之多少也蓋言男子易治婦人難治孩子更難治也蓋醫須望聞問切而婦人之病往往秘而不言即言亦不詳盡且婦人多鬱悶病情多夾雜故較治男子為難而孩子則言語不通病情難測氣血未堅臟腑柔脆體質嬌嫩略受殘傷立見委謝故較婦人為尤難也曰然則小兒之體既如此柔弱治病將無從下手乎曰小兒體雖柔弱病亦較為簡單曰何故曰小兒無七情六慾積痼癡頑之病其致病之原無非外感風寒內傷飲食外感者有表證而無里證為發熱頭痛拘急無汗或因風搐搦之類是也內傷者只有里證而無表證為吐瀉為腹痛脹滿驚疳積聚之類是也熱者必有熱症如熱渴煩躁秘結癰瘍之類是也寒者必有寒證如清冷吐瀉無熱無煩惡寒喜熱之類是也所病不外此數種且其藏府清靈隨撥隨應苟辨證精確一劑可以見效故曰較為簡單若審斷不確妄加攻伐亦一劑可以送命故曰較婦人尤難也曰小兒之病惟驚風一症最為危險時醫多用鎮驚開竅之法清熱散風之藥往往愈治愈危終至不救其故何歟曰驚風有急驚慢驚之別二症全屬相反豈可概以鎮驚開竅清熱散風治之如急則喉中多有熱痰用抱龍牛黃等丸及清熱消導之藥一劑可以見功若慢驚乃系寒痰虛風非逐寒補腎不可如不分急慢虛實以一方治二症未有不誤也大凡因發熱不退及吐瀉而成者總屬陰虛陽越並非感冒風寒發熱可比不宜發散治宜培元救本引火歸源必先用辛熱衝開寒氣再進溫補方合治法否則為禍非淺也又問時聞世聚談曰中醫長於內科西醫專於外科患病之人不可不察此言究可信乎否乎答曰中醫法理精微西醫手術精良世人因此而遂有此等之說不知醫學一道無論中西有一分學問即有一分功夫有一分功夫即有一分效驗愈研究愈無窮盡富有學術經驗者皆優淺嘗輒止者皆劣誠不必以內外分中西要當皆以學力分優劣耳曰中醫謂肝在左西醫主胃肝居右又曰居中孰非孰是曰肝實居中而偏於右氣應在左也按中醫學說肝系居脊間第九椎正中此即居中之明證也素問六元正紀大論曰民病寒於右下通一子注云金旺傷肝肝在右脅之下此即肝右之明證也禁刺論曰肝生於左滑伯仁注曰肝之為臟其治在左其臟在右脅右腎之前並胃著脊之第九椎此即居中偏右氣應在左之明證也故唐容川人身陰陽論篇云其系實居脊間正中至於診脈分部左右者亦從其氣化而分非以形而分也又問西醫云凡人周身皆有動脈豈特寸關尺三部何得只據三部為斷答曰中醫古時本有遍診全身動脈之法故古之三部九候與今之三部九候不同素問三部九候論曰上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手大陰也中部地手陽明也中部人手少陰也下部天足厥陰也下部地足少陰也下部人足大陰也故古法上至人迎下至趺陽遍身皆診即如仲景脈法尚有上取寸口下取趺陽之說自難經十八難以寸關尺分三部三部各有浮中沉分九候後世宗之遂為診家捷法而古之遍診法遂廢此亦舍繁就簡之意而理實至細至精非不知全身有動脈也呂漢璋問或云肝無補法宜涼伐其說是否近理答曰所謂肝無補法者指肝實而言耳若肝虛之證何嘗無補法經云肝與膽合故足厥陰之經與足少陽之經為表裡其象木其主春其脈弦其神魂其養筋其候目其聲呼其臭臊其液位其味酸氣盛則為血有餘故目赤兩脅下痛引少腹善怒甚者氣逆頭眩耳聵頰腫皆肝實之症也氣虛則為血不足故目昏兩脅拘急筋攣不得太息爪甲枯面青善悲恐皆肝虛之症也實則瀉虛則補脈耎不可汗脈弱不可下要當量其虛實審其脈象而因病施治也故鹿茸丸為治肝元氣虛之藥黃耆湯為治肝虛氣冷之藥地黃丸為治水不生木肝乏生氣之藥柏子仁丸為治肝元久虛之藥人參飲為治肝虛筋急之藥四聖散為治肝臟虛冷之藥他如阿膠棗仁苡仁木瓜皆為補肝之品均當審病用藥耳至於肝實之證其脈見於左手關上陰實者乃為足厥陰有餘之候實則生熱熱則陽氣盛固非涼伐不為功故肝臟窒熱心膈煩悶頭目不利者當用大黃丸肝火鬱熱不能安臥者當用瀉青丸肝火燥盛左脅作痛者當用左金丸肝臟積熱氣昏血澀者當用瀉肝湯他如青皮青黛黃連膽草皆為肝藏涼瀉之藥然皆系治實熱之症固非攻伐涼瀉不見效故曰肝無補法耳沈光楫問日來天氣既熱患病亦多梅城時氣甚現大概皆頭暈欲嘔而起然口不渴苔終白脈浮軟治以辛散兼清利亦有效者乞指示治法答曰今年癸亥之紀厥陰風木司天少陽相火在泉中運少徵其運熱目下時交小滿以後主氣少陽相火客氣厥陰風木客氣因與司天同氣而得助故經云三之氣天政布風乃時舉民病泣出耳鳴掉眩言其病皆司天之氣與客氣所致也今病皆從頭暈欲嘔而起者夫頭暈與耳鳴掉眩同為司天與客氣之風木所致欲嘔者木不務德而侮土也中運少徵歲火不及故口不渴而苔終白辛從金化宜於治木治以辛散自應有效惟歲半以上天氣主之身半以上為天之氣故病先頭暈欲嘔治以辛散固甚相宜惟木亢害土兼用清利則不宜也經云上辛涼中咸和下鹹寒然則此時尚在三氣之中宜用辛散以治木兼用鹹和以治不足之火也明矣若交到大暑節氣則客氣為少陰君火用事不能再用此法蓋客之君火與在泉之相火君相二火交熾時以當歲半以下地氣主之則不得不捨辛散而從鹹寒之治矣然此專指時氣所發之病而言他證不在此例或舍時從證或審證從時均當隨機應變因病制宜又不可執中無權焉東垣醫案載有大頭天行一證泰和間人多病此醫者以承氣加板藍根下之稍緩翌日如故東垣曰夫人身半以上天天之氣也身半以下地地之氣也此邪熱客於心肺之間上攻頭面以承氣湯瀉胃中之熱是為誅伐無過遂處普濟消毒一方活人無數目下時症宜用辛散雖與熱客心肺者之宜用苦寒大不相同然不宜下利則一也陳五昌問寒病服熱藥而寒不去熱病服寒藥而熱不退何也答曰病有在表者有在裡者有在標者有在本者有表寒裡熱者有裡寒表熱者有標寒本熱者有本寒標熱者有虛寒虛熱者有實寒實熱者有假寒假熱者有真寒真熱者有用寒遠寒者有用熱遠熱者有舍時從證者有審證從時者若不辨表裡標本虛實真假以及五運六氣而但知見寒用熱見熱用寒不特寒不去熱不退且未有不寒者益寒熱者益熱卒至不救也庸醫殺人可勝嘆哉又問頭為諸陽之會生聞之久矣既為諸陽之會則何以目為肝竅耳為腎竅口為脾竅鼻為肺竅腦則腎主而厥陰與督脈又會於巔其故何也答曰經雲頭為諸陽之會者言諸陽脈氣皆會於頭指六陽經脈皆上頭而出於頭氣之街此蓋指脈氣而言與臟氣無涉也經云目為肝竅耳為腎竅口為脾竅鼻為肺竅者言肝氣通於目腎氣通於耳脾氣通於口肺氣通於鼻故曰五臟常內閱於上七竅五臟不和則七竅不通言五臟位次於內氣達於外而上閱於頭蓋指五藏之氣各有所通而言與精髓無涉也經云腎主腦者言腎精生髓髓由脊上行而入於腦故腦為諸髓之海此蓋以髓會絕骨而言與腎氣通耳無涉也經云厥陰之脈與督脈會於巔者蓋言督脈由長強夾膂上項散頭上厥陰之脈循喉嚨之後上入頏顙連目系上出額與督脈會於巔此蓋指厥陰之脈與督脈之行而言與目為肝竅無涉也內經所言各有所指各有不同安可泥一頭字而以耳目口鼻腦巔頂均在頭之中遂生疑竇乎又問經云陰氣太盛陽氣弗能榮也故曰關陽氣太盛陰氣弗能榮也故曰格關格者不得盡期而死也思陰氣太盛則壯陽消陰使歸於平可也陽氣太盛則壯陰制陽以抵於和可也何以遽云死耶而仲景亦無法治之生不明其致死之故願夫子明以教之答曰子所謂可使歸於平抵於和者乃陽盛陰虛陰盛陽虛一證非關格一證也經云弗能榮者言陰陽乖亂不能營行也陽氣不能營行則關六陽之氣在外故曰關關者陽之氣不得入也陰氣不能營行則格六陰之氣在內故曰格格者陰氣不得出也陰陽俱盛不得相榮者陰自陰陽自陽不相浹洽彼此格拒不相通既不相通則陽自陽而陽中無陰陰自陰而陰中無陽孤陽不能獨立孤陰不能自生不脫於陽必脫於陰脫陽死脫陰亦死故曰關格者不得盡期而死也又問諸痙項強皆屬於濕夫諸痙項強皆筋病也應藏為肝應六氣則當以風而內經皆屬於濕何也答曰素問至真要大論云諸痙項強皆屬於濕者非指是厥陰經而言蓋指足太陽經而言也夫痙固風邪病項為足之太陽濕兼風化而侵寒水之經濕之極也太陽所至為屈伸不利太陽之復為腰椎反痛屈伸不便是又為寒水反勝之虛邪也經筋篇云足太陽之筋病反折項筋急繆刺論云邪客於足太陽之絡令人拘攣背急生氣通天論云因於濕首如裹濕熱不攘大筋短小筋弛長經脈篇云膀胱足太陽也是動則病沖頭痛目似脫項似拔六元正紀大論云太陽所至為寢汗痙熱病篇云風痙身反折先取足太陽仲景云太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒者名曰柔痙太陽病發熱脈沉而細者名曰痙按痙之屬太陽者蓋痙必反張其病在肩背肩背之經絡督脈與太陽也徐學敏問太陰無下症何故答曰太陰者脾也仲景傷寒論云太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬陳氏注曰太陰主地而主腹故腹滿然腹之所以滿者地氣不升也地氣不升則天氣不降不降故上者不能下而吐食不升則下者不能上而自利太陰濕土主氣為陰中之至陰陰寒在下而濕氣不化故時腹自痛若誤以痛為實而下之則脾土愈虛不能轉運必於脾部之胸下結硬此太陰所以無下症也唐氏注曰腹字是言腸胃之外皮膚之內凡是膏油重疊復後故名曰腹脾所司也飲食入胃此膏油熏吸之而水乃化氣走入下焦食乃化液以奉心血若太陰病脾之膏油不能熏吸則食不下行久而吐出水穀停於腸中而寒熱又下注入腸則自利益甚寒氣攻阻則時腹自痛若用涼藥下之則腹中膏油得寒而結有若冰凝故結硬此太陰之所以無下症也然此皆以氣而言若以經而言足太陰脈入腹屬脾絡胃手太陰脈起於中焦下絡大腸還循胃口上膈屬肺其義亦同至以藏而言雖脾也而肺亦屬焉曰內經云攻裡不遠寒王太僕注云下利故用寒不遠寒又曰以其不住於中也此是何解曰素問六元正紀大論所謂發表不遠熱攻裡不遠寒者蓋言中於表者多寒邪鬱於里者多熱邪中於表者宜發表鬱於里者宜攻裡發者逐之於外也攻者逐之於內也寒邪在表非溫熱之氣不能散熱郁在裡非沉寒之物不能除凡發表邪應用熱藥雖在盛暑之時亦應用熱不能因夏月天氣之熱而避用熱藥凡攻裡熱應用寒藥雖在嚴冬之時亦應用寒不能因冬月天氣之寒而避用寒藥此即舍時從症之意也如非發表攻裡則不在此例蓋因發表則藥氣隨表邪而出攻裡則藥氣隨裡熱而下不至留住於中而生他病故曰以其不住於中也假如表裡俱熱者宜用涼解如用小柴白虎益元之類以取汗愈病是也其因陰寒留滯者宜用溫中如用理中四逆回陽之類而除痛去積是也但此皆非發之攻之謂耳所謂發者開其外之固也所謂攻者伐其內之實也倘但見外感發熱等證不察傷於寒而傳為熱者有本寒標寒之別輒用苓連等藥以清其標則邪寒在表藥寒在裡以寒得寒致使內外合邪遂不可解此即用寒住中之害也又如內傷喘痛脹滿等證多有三陰虧損者如不辨虛實便用硝黃之屬則假實真虛之病從而伐之將病未除而元氣散矣此即攻熱住中之害也曰然則張子和標本運氣歌曰風從火斷汗之宜燥與濕兼下之可此說非歟曰此說早有人非之矣張介賓曰子和發明火濕二字之義甚得其要獨惜治法有未盡然此二語者也夫諸病之化豈盡屬有餘而必無不及若不辨有餘不及而則概以二法盡之殊失內經本旨夫化而太過者宜抑化而不及者宜培豈可概指為有餘而不知有不及乎
