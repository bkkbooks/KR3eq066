body:
  text: 懶園醫語卷一答廣濟醫藥音門學校教務長阮其煜問問曰嘗聞病家有稱某醫為涼手專用涼藥某醫為熱手專用熱藥似乎用藥偏於一路使病者多生疑忌是否有此情形尚祈指教答曰此蓋有二因也一因於醫者之誤人一因於患者之自誤夫症有寒溫虛實之別即藥有涼熱補瀉之分視病用藥藥到病除若執於一偏未有不誤此醫者之誤人也患者因是而生疑忌雖應用涼藥疑其為涼手而忌之應用熱藥疑其為熱手而忌之良醫因此而受謗患者因此而遊移勢必因循坐誤病入膏育此患者之自誤也夫中醫之芩連白虎去煩止渴即西醫清涼之法也中醫之桂附芍草以治拘急疼痛即西醫緩攣之法也中醫之真武四逆以救危桃花餘糧似固脫即西醫收酸之法也中醫之建中補虛助弱即西醫強壯之法也中醫之承氣下燥豬苓利水瓜蒂吐宿即西醫漏泄之法也中醫之桂枝麻黃解表邪陷胸瀉心祛痞積抵當桃承去蓄血即西醫分解之法也醫家用藥如兵家用兵知己知彼百戰百勝豈可執於一偏概用涼概用熱乎問曰嘗聞人言每有疾病不妨待其自愈故有不藥為中醫之説是否至當答曰此言不足為訓其原因蓋專為庸醫而設實憤激之談也中者上之下下之上也言與其不得上醫而治不若不為下醫所誤耳不然有病不治積而愈深坐以待斃安有是理哉素問皮部論曰病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃入舍於腑臟故皮有分部不與而生大病也是蓋言有病不醫愈久愈深必致不救豈有待其自愈之理乎要之中醫一道良醫固多庸醫亦不少大凡欲學中醫必先以國文宏通淹博為根底靈素諸經辭義深奧斷非國文淺陋者所能讀即讀亦根銀宵肯不知所衷宋神宗有鑑於此考選諸生仿周禮遺制設六科以教士即今之醫校惜乎後世遂廢每有讀書不成學劍不就日暮途窮藉一二本藥性賦湯頭歌以懸壺問世者及問其臟腑經絡俞穴茫然若聵若聾則生理解剖之學更無論矣不知解剖一科中醫發明最早靈樞經載死者解剖而視之説王莽傳有太醫上方刳剝刑人之尸量度五臟之事華他傳載麻藥之方此外諸書不堪枚舉且不獨此也大凡欲從事醫學必先知天文地理則基礎固而學始不浮即如氣穴三百六十五氣腑三百六十五溪谷三百六十五皆合乎周天三百六十五度之星辰經脈十二經絡十二經筋十二皆合乎地球十二經水之灌注營衛之生會合乎天道之循環氣血與精髓合乎地中之四海西醫謂造化主惠育群黎所謂造化主者即天地之神也與中醫人本天地之中以生之義不約而同故不知天文地理而貿然學醫者終必流為庸醫庸醫濫竿醫界魚目混珠致使社會一般人心理因恐慌而遂有不藥為中醫之説吾知學校振興人材蔚起此語將不取消而自取消矣問曰何為寒體何為熱體究由何而區別之答曰寒熱者陰陽也寒為陰熱為陽內經曰陽勝則熱陰勝則寒陰氣凝滯故體寒陽氣升散故體熱大凡身體怯弱畏寒喜熱者皆寒體由於陰氣凝滯故也身體盛實喜寒畏熱者皆熱體由於陽氣升散故也有寒不熱乃陰陽和平之人無偏勝也靈樞經曰人有陰陽分治五態何為陽人何為陰人約言之則陰人陽人二態分言之則太陰之人少陰之人太陽之人少陽之人陰陽和平之人五態不同其筋骨氣血各異古之善用針艾者必視人之五態而分治之也分治之法經云太陰之人多陰而無陽其陰血濁其胃氣澀陰陽不和緩筋而厚皮不之疾瀉不能移之少陰之人多陰少陽小胃而大腸六腑不調陽明脈小而太陽脈大必審調之其血易脫其氣易敗太陽之人多陽而少陰必謹調之無脫其陰而瀉其陽陽重脫者易狂陰陽皆脫者暴死少陽之人多陽少陰烴小而絡大血在中而氣外實陰而虛陽獨瀉其絡脈則強氣脫而疾中氣不足病不起也陰陽和平之人其陰陽之氣和血脈調謹診其陰陽視其邪正安容儀審有餘不足盛則瀉之虛則補之不盛不虛以經取之此即所謂視五態而分治之法也大抵陰陽和平者本無盛虛之可據而或有邪正之不調但求其所在之經而取病耳偏陰偏陽之體大半根於先天中醫之所謂先天即西醫所謂遺傳性也問曰驗方新編內有陽和湯治陰疽甚效其所以當用此等藥品之理如何答曰按驗方新編此方與全生集略有不同驗方新編無白芥子全生集有白芥子二錢其餘各藥及分兩皆同治陰疽用此方者因陰疽之毒發於五臟其症皆屬陽虛多由陰寒之氣凝結而成凡陰寒凝結之氣非得陽和之氣以解之不能見功名曰陽和湯職是故也地黃熟用微溫而大補真陰重用一兩以為君救陰虛也鹿為純陽之性角遇夏至陰生即解尤為純陽中之陽用三錢以為臣所以生陽和之氣也肉桂甘辛大熱性亦純陽能解陽寒之凝結甘草甘溫和中能消五臟發之瘡疽各用一錢以助陽和之氣為佐炮薑溫中助陽能去沉寒痼冷而回陽麻黃辛溫開腠散寒各用五分以為使加白芥子二錢以其辛溫之氣除寒暖中能消毒腫也酒能和血養氣通經脈行藥勢故服後再飲好酒數杯以助藥力王洪緒曰麻黃得熟地不發表熟地得麻黃不凝滯神用即在是也此方用熟地以補陰用諸藥回陽則陽和之氣達而陰凝之氣散矣其為陰疽之勝藥不亦宜乎稱之曰陽和湯其理由正在是也答中醫專門學校學生問華承本間曰讀靈樞經脈篇足厥陰肝是動則病此各臟有各臟之病固無足怪惟虛則遺溺實則閉癃以此二句蓋有疑也矧夫子言三焦決瀆之腑故下俞出於足太陽膀胱之絡入於膀胱故能約束下焦以排泄膀胱之水由此以推三焦實宜乎閉癃三焦虛宜乎遺溺而閉癃遺溺之病其標雖在膀胱而其本實從三焦此理顯然奈何三焦有閉癃遺溺之病而肝臟亦如是也況三焦與心包絡相為表裡而肝與膽相為表裡夫肝與三焦初無相關乃三焦有閉癃遺溺之病而肝亦然學醫者何以辨三焦與肝臟之閉癃遺溺敢問答曰病同而所以致病之原因則不同也其病從三焦發者因三焦下俞出於足太陽膀胱之絡約束下焦子於此理已明毋庸贅説其病從肝臟而發者因肝脈與腎脈相通故也腎附膂骨兩旁腎經之脈由膂骨而上接於肝故上文曰病在腰痛不能俯腎又通竅於二便又與膀胱相表裡所以肝臟患虛患實亦有閉癃遺溺之病其原因一也肝經之脈過陰器抵小腹其別者從脛上睪結於莖故亦有此病其原因二也又按靈樞經筋篇惟足三陰足陽明之經皆聚於陰器而肝則獨結陰器而絡諸經是脾胃腎與肝同聚陰氣而又為肝所絡肝主行散疏泄實則肝氣厥逆不能行散脾胃水穀之精氣故上文有胸滿嘔逆之病虛則下焦飧泄不能疏泄腎與膀胱之氣故本文有遺溺閉癃之病其原因三也西醫謂胃肝無所事只以回血生出膽汁入腸化物是與肝主疏泄之義實辭異而意同也楊紹球問曰傷寒之傳經次第而入由太陽而終於厥陰依太極圖之列毫釐不差蓋六經彼此相接如軌道一般然分六經為手足三陰三陽則有十二經而十二經氣血之流行迥然不同如手太陰肺經止於少商穴而別交於手陽明大腸經由大腸而胃由胃而脾其餘各部皆依經表裡相傳由此觀之則傷寒之邪既入於足太陽膀胱經可直達於足少陰腎經其不然者究屬何故夫邪之與血皆循六經而走但傳經之義不相符合豈邪之所走而血不能行耶抑血所行而邪不能走耶乞夫子垂教焉答曰傷寒傳經論邪之所中也十二經氣血之流行論營氣運行之次序也二者本風馬牛不相及豈可牽合而概論之耶且子誤矣子所謂傷寒傳經次第而入者子但知其常不知其變也按素問所言傷寒傳經先自三陽之表後入三陰之裡者此陰陽先後之序也東垣云太陽者巨陽也膀胱經病若渴者自入於本也名曰傳本太陽傳陽明胃土者名曰巡經傳太陽傳少陽膽木者名曰越經傳太陽傳少陰腎水者名曰表裡傳太陽傳太陰脾土者名曰誤下傳太陽傳厥陰肝木者名曰巡經得度傳又陶節庵云風寒之初中人也無常或入於陰或入於陽皆無定體非但始太陽終厥陰也或曰自太陽始日傳一經六日至厥陰邪氣衰有不傳而愈者亦有不罷再傳者或有間經而傳者或有傳至一二經而止者或有終始只在一經者或有越經而傳者或有初入太陽不作鬱熱便入少陰而成真陰證者或有直中陰經而成寒證者又有合病並病之證曰合病者兩經或三經齊病不傳者為合病並病者一經先病未盡又過一經之傳者為並病所以有太陽陽明合病太陽少陽合病有少陽陽明合病有三陽合病三陽若與三陰合病即是兩感所以三蔭無合併例也此皆經文所未及而發明於東垣節庵者然其義多本於仲景而為理所必然者也要知經所言者為傳經之常後人所發明者為傳經之變子只見內經所言之傳經由太陽而終於厥陰而只知其常不知其變所謂坐井觀天而以天為小者也至於十二經氣血之流行有一定不易之軌道故靈樞營氣篇論營氣運行之次序自寅時始於手太陰而終於足厥陰及任督而後出於手太陰經循環不已以應呼吸漏下晝夜而為五十營蓋二十八脈以應天之二十八宿此天地之紀所謂有常無變也由此觀之是十二經氣血之流行與傷寒之傳經顯然各判兩途安能牽強求合耶華承本問曰讀夜半而陰陽大會蓋有疑焉夫陰陽者夜半為陰隴日中為陽隴一在日之間一在夜之半奈何陰陽大會於夜半耶敢請夫子教之答曰盛極必衰絶處逢生乃天地間一定不易之理是即所謂物極必反也夫日中為陽隴陽氣極陰氣生故曰陰生於午夜半為陰隴陰氣極陽氣生故曰陽生於子此盛衰之理也而陰陽大會獨不會於日中之午而會於夜半之子者非盛衰之理不同而動靜之機有異也日中主動夜半主靜主動則行主靜則臥人臥則血歸於臟故營衛二氣皆會於天一之中靈樞營衛生會篇云天下萬民皆臥命曰合陰所謂合陰者言全身血氣大會於陰極靜極之時也子但知盛衰之理不知動靜之機宜乎有此疑問耳王廣蔭問曰病入膏育則為不治生於是有疑焉夫膏之原在鳩尾盲之原在脖胦膏育有疾取其鳩尾脖腴可也何謂不治之症哉願夫子明以教我答曰此説本於左氏春秋成公十年晉侯夢大厲披髮及地搏膺而踴曰殺余孫不義余得請於帝矣壞大門及寢門而入公疾求醫於秦秦伯使醫緩往治之未至公夢疾為二豎子曰彼良醫也懼傷我我焉逃之其一曰居盲之上膏之下若我何醫至曰病在育之上膏之下攻之不可達之不及藥不至焉疾不可治矣注肓之上膏之下乃連心脂膏也由此觀之病在膏尚可治病在肓尚可治惟在膏下肓上則處於連心脂之間斷非治鳩尾脖胦所能奏效且連心脂直接手少陰心臟治脂即治心心為君主之官不能受病不能受治受病死受治亦死故曰不治之症也然則彼所謂膏育不治也者非言膏不可治育不可治蓋言育上膏下之連心脂不可治耳讀書者不可以辭害意也張永昭問曰經云心生血肝藏血是人身全體之血皆在於肝何以經又曰衝任為血海生不能明乎此理願夫子明以教之答曰素問五臟生成篇云諸血者皆屬於心蓋言血氣者人之神神者心之主謂血居脈內而心行之故亦曰心生血也又云人臥血歸於肝蓋言人靜而血歸肝臟也至於靈樞海論云衝脈為血海者蓋言衝脈與任脈皆起於胞中並足少陰之經夾臍上行之胸中而散其後者上循背裡為經絡之海血主經絡故衝脈為十二經之海亦為血海言血海受納諸經之灌注精血所藏之區故曰血海亦曰經脈之海以其主滲灌溪谷與陽明合於宗筋會於氣街而陽明為長誠以陽明為多氣多血之腑故主潤宗筋而利機關衝脈為精血所聚之經故主滲灌溪谷但衝脈與任脈同起於胞中亦並少陰之大絡而下行與陽明會於前陰故男女氣血皆由前陰而聚者以二經血氣總聚於此故稱為五臟六腑十二經之海亦稱血海由是觀之所謂心生血者言血屬心即心行血也所謂肝藏血者言人臥而血歸肝臟也所謂衝脈為血海者言血居十二經脈之內十二經脈皆屬於衝脈故曰血海亦曰十二經之海也然則心曰生者不過行血而已肝曰藏者不過藏血而已惟衝脈為五臟六腑之海則凡十二經之氣血皆受之以榮養周身此衝脈所以稱為血海也故靈樞海論稱人之四海曰腦為髓海膻中為氣海胃為水穀之海衝脈為血海也所以痿論曰衝脈者經脈之海動輸篇曰衝脈者十二經之海五音五味篇曰衝脈者五臟六腑之海要無非主滲灌溪谷榮養周身與海論血海之説皆相符合也子因心生血肝藏血之説遂疑人身全體之血皆在於肝而欲以肝為血海也宜乎不能明此理矣且婦人妊孕全賴任沖二脈其所以全賴此二脈者蓋因二脈皆起於胞中而衝脈又為全身血脈所聚之處故耳即此為證則衝脈為血海之説自不言而喻矣左冠章問曰三焦雖一府也有云無形者有云有形者有云位於兩腎之間者有云與右腎為表裡者有云與心主為表裡者究之三焦有形耶無形耶位於何處與何臟為表裡而內經又以為孤府何耶答曰三焦之説諸家聚訟紛壇或言有形或言無形或言與包絡為表裡或言三焦與膀胱附於左右二腎或言左為腎右為三焦千載以來議論不定推原其故誤實始於難經夫三焦者五臟六腑之總司安得謂之無形而二十五難曰心主與三焦為表裡俱有名而無形但謂其表裡則是謂其無形則非無奈諸家自王叔和王太僕而下悉宗其説及至徐循陳無擇始創有形之説謂有脂膜如掌大正與膀胱相對有二白脈自中出夾脊而貫腦按靈樞本輸篇云三焦者決讀之府水道出焉屬膀胱是孤之府也本臟篇云密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄論勇篇云勇士三焦理橫怯士三焦理縱決氣篇云上焦開發宣五穀味中焦受氣取汁營衛生會篇云營出中焦衛出下焦上焦出於胃之上口又曰上焦如霧中焦如漚下焦如瀆素問五臟別論云夫胃大腸小腸三焦膀胱五者天氣之所生也六節臟象論曰脾胃大腸小腸三焦膀胱五者倉廩之本營之居也歷證以上經旨既曰無形何以有水道之出何以有厚薄之殊何以有縱橫之理何以有如漚如霧如瀆之分乎至於位於何處觀字義即可知所謂三者象三才也際上極下之謂也人之身外自皮毛內自臟腑無論巨細皆有名目惟於腔腹周圍上下全體狀若大囊而無名者非三焦乎焦古作瞧即人身膜膈所以行水者也西醫謂飲水食入胃胃之四面皆有微絲血管吸出所飲之水散走膈膜於連網油膜之中而下入膀胱然則西醫所謂連網者即中醫所謂膈膜亦即俗謂網油而周圍於臟腑之外者也至於與何臟為表裡則三焦既包羅五臟六腑之外為臟腑之外衛心包絡為君主之外衛故皆屬陽均稱相火則其脈絡自必相通自當與包絡相表裡故靈樞經脈篇云心主手厥陰之脈出屬心包絡下膈歷絡三焦此其明證至於內經之稱為孤府者蓋以三焦包五臟六腑之外為全體之大臟自與他臟不可同日語則謂之孤府不亦宜乎又問曰脈訣言十五絡是十二經絡加督之絡任之絡脾之大絡而難經以十五絡為十二經絡加陽絡陰絡脾之大絡何也答曰靈樞經脈篇謂十二經加任督與脾之大絡為十五絡難經二十三難云絡脈十五滑氏注曰十二經加陽絡陰絡脾之大絡為十五絡者蓋謂任行於腹督行於腎背為陽故曰陽絡腹為蔭故曰陰絡陰絡陽絡即任脈督脈也子殆以陽絡陰絡為陽維陰維故疑其説不同耳又問曰營衛生會篇曰其清者為營濁者為衛葉天士溫熱論曰肺主氣屬衛心主血屬營如是為清者走上屬心為血濁者走下反屬於肺反為氣何也答曰營衛生會篇云清者為營蓋言營行脈中精氣之循經而行者為營也濁者為衛蓋言衛行脈外浮氣之不循經而行者為衛也非言清走上濁走下也即曰營出中焦衛出下焦者亦但指生始而言非會合也至於溫熱論所謂肺主氣屬衛心主血屬營者蓋言肺主氣屬皮毛衛行脈外在膚表之間為衛氣故曰肺主氣屬衛也心主血屬裡營行脈中在經隧之間為營血故曰心血屬營也子疑清者走上濁者走下宜乎有此問耳又問曰三難曰關以前者陽之動也遂上魚為溢為外關內格此陰乘之脈也關以後者陰之動也遂入尺為覆為內關外格此陽乘之脈也三十七難又以六陰脈盛為格六陽脈盛為關靈樞脈度篇曰陰氣太盛則陽氣不能營也故曰關陽氣太盛則陰氣弗能營也故曰格素問脈要精微論曰陰陽不相應病名曰關格仲景平脈篇曰微水大者則為關格不通不得尿又曰趺陽脈伏而澀伏則吐逆水穀不化澀則食不得人名曰關格由是觀之靈樞仲景皆以關格為脈而素問難經皆以關格為病何也答曰關格一證在內經本言脈體以明陰陽離絶之危證也為六節藏象論終始篇禁服篇及脈度經脈等篇言之再四類多兼脈症而言而難經三難曰上魚為溢為外關內格入尺為覆為內關外格已失本經之旨而仲景云在尺為關為寸為格關則不得小便格則吐逆後世自叔和東垣以來皆以此相傳遂置關格一證於不問丹溪云此證多死寒在上熱在下脈兩寸俱盛四倍以上法當吐以提其氣之橫格不必在出痰也蓋既曰兩寸俱盛四倍以上又安得謂寒在上且脈大如此則浮豁無根其虛可知尚可吐乎其謬孰甚夫內經云人迎四倍寸口四倍既非尺寸之謂而曰吐逆者特隔食一證耳曰不得小便者特癃閉一證耳其與關格何涉關格一證在內經本以人迎察六腑之陽寸口察五臟之陰人迎盛至四倍以上此陽明經孤陽獨見水不濟火也故曰格陽格陽者陰格於陽也氣口盛至四倍以上此太陽經元陰無主氣不歸精也故曰關陰關陰者陽關於陰也若人迎寸口俱盛至四倍以上且大且數此其陽氣不藏故陰中無陽陰氣不升故陽中無陰陰陽相離故名關格也要之有是脈即有是證有是證即有是脈本不應單言脈單言證脈度篇所云陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣不能榮也故曰格陰陽俱盛不能相榮故曰關格關格者不得盡期而死何嘗非舉脈證而兼言之耶若以脈言則如前之四倍者是也若以證言則又有陰陽俱盛者以陽病極於陽分而陰病極於陰分也凡陽盛於陽者似乎當瀉而陰分見陰又不可瀉陰極於陰者似乎當補而陽分見陽又不可補此證乃陽自陽而陽中無陰陰自陰而陰中無陽補之不可瀉之不能有死而已故曰關格者不得盡期而死也脈耶病耶自可不言而喻矣又問曰膀胱有上口而無下口乎抑有下口而無上口乎答曰膀胱有下口而無上口也營衛生會篇云下焦者別回腸注於膀胱而滲入焉難經三十一難云下焦者當膀胱之上口主分別清濁後人因此一言遂謂膀胱有上口經云下焦別回腸注於膀胱者言人飲食之水由三焦而下膀胱謂水穀並居胃中傳化於小腸當臍上一寸之水分穴處糟粕由此別行於回腸從後而出津液由此別滲於膀胱從前而出也人但知膀胱主溺不知人飲食之水無不入於膀胱水入膀胱化氣上行則為津液其所剩餘質乃下出而為溺故曰滲入膀胱但膀胱只有下口並無上口故不云注入而云滲入難經所言上口者以滲入之處為言非謂真有口也如果有口則經不云滲入矣後人不明經文之義誤解難經上口之言遂謂膀胱有上口實為難經所誤也王廣蔭問曰夫百病皆自腑入臟則先治其腑可也惟咳病則有自臟入腑者而先治其臟可也由此觀之凡醫各病治臟腑足矣而十二經之穴何與焉且治十二經之穴而藥物亦不能至其分肉筋骨之間非砭石之刺其穴者可比十二經之穴有何用乎答曰經雲精氣之循經而行者為營氣又曰營衛相將而行則榮中有衛然則十二經脈者所以行營衛也穴道者所以知經脈之根結支別也不能知穴道安能知經脈不能知經脈安能知營衛之行不能知營衛之行安能知臟腑之病經脈為臟腑之大經隧五臟六腑皆屬焉子欲舍經脈而治臟腑是為捨本逐末況素問皮部論曰病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃而舍於腑臟故皮者有分部不與而生大病也是蓋言病不早治愈久愈深必致不救豈可待其至臟腑而治乎余偉問曰醫綱云右腎主命門一説兩腎中間主命門陳修園曰凡稱門者皆指出入之處也命門者男女交會之際男施由此門而出女受由此門而入及胎由此門而生張隱菴曰內經止曰腎原無命門之名説兩腎中間主命門者不經之語也不知實有實無實居何處答曰靈素兩經並無命門之説雖靈樞根結衛氣素問陰陽離合等篇云太陽根結於至陰結於命門者目也此蓋指足太陽經之睛明穴而言非指此也因睛明所夾之處為腦心乃至命之處故以此為名耳此外並無兩腎間及右腎為命門之説惟難經三十六難云腎兩者非皆腎也其左者為腎右者為命門命門者諸神精之所舍元氣之所繫也男子以藏精女子以系胞王叔和因之張隱菴非之後世莫衷一是夫以命門為男子藏精女子系胞則可以右腎為命門則不可誠如其言試問右腎藏精左腎藏何物乎又難經三十九難云命門氣與腎相通謂氣與腎相通則可謂右腎為門則不可夫腎具水火中系屬命門故督脈經外俞命門一穴在十四椎之間是命門與腎原非兩物也黃庭經云上有黃庭下關元後有幽門前命門又曰閉塞命門似玉都然則命門為藏精之所無疑矣又曰丹田之中精氣微玉房之中神門戶梁邱子注曰男以藏精女以約血故曰門戶又曰關元之中男子藏精之所陽元子曰命門者下丹田精氣飛出之處也是皆醫家所未言而道家言之實足為此發明者也脈經云腎與膀胱合為一腑合於下焦在關元之後又曰腎名胞門子戶夫所謂子戶者即子宮也即玉房之中也凡男精女血皆存乎此子由是而生故曰子宮者實由男女之通稱也道家名之曰丹田以先天真一之氣藏乎此也醫家名之曰血室以任沖之脈盛於此則天癸如期也由是觀之惟陳氏所云近是要之腎與命門實非兩物道家煉丹曰坎中離坎即腎命門者一點真陽即坎中之離也廣言之則命門者子宮之門戶子宮者腎臟藏精之腑也腎為北方之水所以蓄坎中之真陽而司北門之鎖鑰而其所以為鎖鑰者正賴命門之閉固此命門與腎本同一氣而為先後天立命之門戶也約言之則腎即命門命門即腎耳諸家拘於形泥於迹或以左右分水火或謂兩水中夾一火沾沾於形迹皆拘執不化之見也又問曰經云膻中者臣使之官喜樂出焉又云手厥陰經主心包絡高士宗云膻中者即心包絡也此説是同一物也醫綱云心包絡是心上之黃脂而別為一經與上焦相表裡膻中者即胸中膈膜之上心肺之旁空處也此説不同敢間孰是答曰二説本非兩歧也但膻中二字當分讀不當連讀膻一物膻之中又一物也心包一臟難經言其無形滑伯仁曰有形在心下橫膜之上豎膜之下其與橫膜相黏而黃脂裹者心也脂漫之外有細筋膜如絲與心肺相連者心包絡也然則心包在膈膜之上心肺之旁空處也明矣又按靈蘭祕典論有十二官獨少心包一官而多膻中者臣使之官喜樂出焉一節今考心包臟居膈上經始胸中正值膻中之所位居相火代群行事實臣使也然則心肺旁空處即膈上之心包絡也明矣要之膻即胸前膈膜周回連著脅脊以遮濁氣膈膜名膻而居膻之中者即是心包絡膈乃上焦專遮濁氣心包絡則相心布令居於膻膈之中故名膻中屬相火又主血以血濟火則相和而不烈故主喜樂心憂者包絡之火不宣也心過喜者心包之火太盛也西醫謂心上半有夾脂裹之即心包絡也但西醫只知包絡之形不知包絡所司何事耳又問曰人身之臟形乃肺居最高為五臟之華蓋下之心次下之脾次下之肝次下之腎此皆剖諸獸之腹觀之明然難經五難以輕手浮而候心肺之脈重按以候肝腎之脈脾脈不輕不重以中候之後人皆宗其法此謂心肺居高脾居中州肝腎直下之義而內經刺禁篇曰肝生於左肺生於右此非肝肺相平乎醫綱云肝附於脊之第九椎脾附於脊之第十一椎此非脾居肝之下乎臟腑乃一定之部位論者何相反耶答曰肺居最高心次之脾又次之肝又次之腎又次之此五臟一定不易之部位也診脈之分部左右上下蓋從其氣化而分非以形而分也至於刺禁篇所謂肝生於左肺生於右者子特未知一生字之義耳滑伯仁注肝生於左句曰肝之為臟其治在左其臟在右脅右腎之前並胃著脊之第九椎經所謂生於左者蓋言肝所生之氣在左非肝之部位在左也肺生於右亦同不然何以不曰居於右而曰生於右不曰居於左而曰生於左乎故曰診脈分部左右亦從其氣化而分耳肺著脊之第三椎肝著脊之第九椎脊居背中央是著脊之肺肝亦居中矣部位固分高下不分左右也至於脾附第十一椎子以為脾低於肝子實未知附字之義耳附者系所系之處也肝系甚長上連心包絡故稱厥陰經繫著脊處則為肝俞穴系循腔子一片遮盡是為膈膜肝系下行前連腹中統膜而後連腎係為肝之根通身之膜內連外裹包肉生筋皆從肝系而發脾長只五寸以附九椎之肝與附十一椎之脾較明明脾在上肝在下也又問曰製藥之法者或助其力或去其力耳天地生成之氣味性質人不能變也如黃耆色黃味甘本補脾氣輕入肌肉或蜜炙之助其補中之力而去其入肌之力大黃直攻卞之品走而不守或制之則性緩以去猛烈之力黃柏味苦大寒其質似精本入腎或鹽炒之以助其力速下也乾薑味辛大熱炮熟以助熱力去其耗散之力半夏法制以去其毒附子泡淡去燥烈之力其餘製法或取其相須相使以入他經皆此義耳豈有熟者補生者瀉熟者溫生者涼乎柯琴注四生丸下云凡草木之性生者涼熟之則溫熟者補而生者瀉其謬乎否乎答曰雷公炮製之法或助其補力或緩其猛性或助其速性或去其烈性或助其熱力或去其毒性或引歸他經各有不同原不能概指為草木之性生者涼瀉熟者溫補也柯氏之言固不足為訓然亦未嘗無是者亦不得盡指為謬也即如地黃一物鮮用大寒胃弱者宜酌生用則涼清胃導赤等散皆用以涼血養陰退陽瀉火熟用則微溫而大補六味八味等丸皆用以補腎而助君相之火此固明明生涼瀉而熟溫補者也要之古人之言有非有是學者當擇善而從不得因一非而疑其百非因一是而信其盡是也此又不可不辨耳朱慶熙問曰靈樞經脈篇曰心包絡與上焦為表裡醫綱中又云心包絡獨與三焦為表裡生不知究與三焦為表裡抑與上焦為表裡張介賓曰三焦獨大諸臟無與匹者又曰孤府乞夫子明以教我答曰靈樞邪客篇云心者五臟六腑之大主邪勿能容故諸邪在心者皆在心包絡包絡者少陰君主之護衛也虞天民云三焦者指腔子而言包羅五臟六腑之外五臟六腑之總司也至其相為表裡則三焦為臟腑之外衛心包絡為君主之外衛猶之帝闕重城故皆屬陽皆稱相火而其脈絡原自相通允為表裡故靈樞經脈篇云心主手厥陰之脈出屬心包絡下膈歷絡三焦手少陽之脈散絡心包合心主素問血氣形志篇云手少陽與心主為表裡難經二十五難云心主與三焦為表裡經言皆可為證自無辨之餘地矣至於張介賓所謂三焦獨大諸臟無與匹而又曰孤府者説非無據實皆本於經按中藏經云三焦者人之三元之氣也總令五臟六腑營衛經絡內外左右上下之氣三焦通則內外左右上下皆通其於周身灌體和內調外營左養右導上宣下莫大於此故曰獨大無與匹靈樞本輸篇云三焦者決瀆之腑水道出焉屬膀胱是孤之府也故又曰孤府又問曰肝之形如葉有七左三而右四並居於左今西醫言肝葉只四而居於右又曰居中果在左在右在中乎其數又若何答曰按難經四十二難云肝葉左三葉右四葉凡七葉又按難經四十一難云肝獨二葉楊氏注云肝者據大葉而言之則是二葉若據小葉而言之則多葉矣按肝形其大葉卻是二葉而葉之下部分各分叉又為二此中醫之所謂二西醫之所謂四者殆指此耳至於所居部位西醫曰肝在於右中醫刺禁論曰肝生於左滑氏注云肝之為臟其治在左其臟在右脅右腎之前並胃著脊之第九椎然則肝明明在右中醫早已言矣刺禁論注所謂生於左者言所生之氣應於左故所治亦當在左耳不然何以不曰居於左而曰生於左乎至於居中之説尤不待辨心在肺之下膈之上不偏左右而居中此因盡人皆知也然素問陰陽離合論云廣明之下名曰太陰廣明者心太陰者脾也太陰之前名曰陽明陽明者胃也太衝之地名曰少陰太衝者衝脈也少陰者腎也少陰之上名曰太陽太陽者膀胱也少陰之前名曰厥陰腎前之上肝之位也然則廣明居南方之正太衝居北方之正其餘者只言上下前後而不言左右是可知皆居於中也所謂在右脅右腎之前者指肝以下部分而言也所謂並胃著脊之第九椎者指肝之上部分所繫之處而言也脊居背之中央則肝實繫於中而偏於右上部分居中下部分偏右耳要之肝臟所靠脊前連膈上半在膈下實不在左所謂左者不過應東方震木而氣在左耳故診脈分部左右亦應其氣化而分非以形而分也王士斌問曰勞風病在肺下乃足少陰腎經受病與傷寒一日太陽表病迥不相同何病理學教師云二症皆是足太陽膀胱表病生不明奧義祈夫子明以教我名曰素問評熱病論云勞風發在肺下勞風者因勞傷風也肺下者在內則胸膈之間在外則四椎五椎之間也風受於外則病因在內王太僕云勞謂腎勞也腎脈從腎上貫肝膈入肺中故腎勞風生上居肺下也腎與膀胱為一合又素問熱論篇云傷寒一日巨陽受之巨陽者足太陽也為三陽之表而脈連風府凡病傷寒者多從太陽始故傷寒一日太陽表病與勞風同為太陽表病也又問曰西醫謂人之知覺在腦中醫謂人之知覺在心孰非孰是答曰皆是也西醫謂腦筋主知覺運動大腦在前小腦在後中為中腦有裂有回分歧疊積耳目口鼻皆通於腦腦經分布又散行於臟腑肢體凡知覺運動皆腦司之也至於腦汁是何物所生西醫不知而中醫則知為腎所生也蓋腎精生髓由脊上行以入於腦是為髓海在頭者名腦在衆骨中者名髓內經蓋分為二故云髓會絶骨而後人與骨脈膽胞合為六者則亦分為二而言之也故西醫治腦無的藥而中醫則知臟腑經脈皆交於腦源流出入治源即所以治流耳中醫云人之有知覺神主之也神乃生於腎中之精氣而上歸干心腎為陰精內含陽精外護心臟之火所以光明朗潤而能燭物蓋神即心火得腎陰濟之而心中湛然神明出焉故曰心藏神所以心血不足則神煩心火不足則神怯風疾入心則神昏也腎生精精生髓精髓充足而伎巧出焉腦為髓之海諸髓皆屬於腦故腎生精化為髓而遍身之髓皆上連於腦凡事物之來必先經耳目經目入腦經耳入腦腦中之髓即將事物記之久而不失心一思之而腦中之事物立現蓋心火陽光猶攝影之鏡也腦髓陰汁猶留影之藥也先照於陽而影附於陰故中醫云髓為月魄心如日光相照為明而神其用者也西醫云腦前筋主知覺腦後筋主運動又曰腦筋有通於心者此皆辭異而旨同者也至於西醫謂諸骨中髓與腦中者不同蓋因解剖時見諸骨中之髓雜有油膜血絲其形狀與腦髓不同耳不知腦髓散走諸骨皆穿膜附筋以入於骨所以內雜膜油血絲非真髓有不同也呂夢祥問靈樞經水篇云地有十二經水以應十二經脈考十二經水皆在中國不及東西洋列邦查東西洋非無極大之流域何故獨以中國為定名若曰中醫則就中國而論則二十八宿普天同然若中外之人體質不同所以有異則今之西醫行於中國何以多效蓋古人不知寰球之大以中國為天下故有坐井觀天之説耳且值此百學競爭日趨進化之日又當棄舊謀新日異月改否則優勝劣敗難免於天演界中蓋西洋萬事以新發明為榮故日以進步中國萬事以守成規為榮故日以退步聞上海中醫學校業已提倡廢除陰陽五運之説我校自當急起直追以仿行之搜羅歷代醫書擇其善者而從之其不善者而去之是否請夫子垂察答曰此蓋爾自坐井觀天非古人坐井觀天也夫以黃岐之聖豈不知寰球之大國外有國而僅舉中國一國者蓋教者舉一隅望學者能三反耳故靈樞經水篇論十二經水下文曰此一隅之陰陽也張氏注云一隅者指中國一國耳子見古人之舉一隅而既不能三反反謂舉一隅者僅知一隅不知三隅試問舉一隅者坐井觀夭乎不之反者坐井觀天乎至於發明新理中醫自漢晉唐宋明清以來名醫輩出諸家所著各書汗牛充棟何一非推廣經旨發明新理雖未必言皆中理而醫學之進步推陳出新何嘗不逐漸進步若徒慕虛名不求實踐欲舍我所長而求人之短盡棄其所學而學但留中醫二字之名則不為並其名而去之專學西醫之為愈也何必徒頂此中醫二字之虛銜哉夫以中醫參考西醫則可本校亦有西醫參考科棄中醫之實學而冒中醫之虛銜則不可且子所謂中醫學校有提倡廢除陰陽五運之説搜羅歷代名醫之書擇善而從不善而去者此言尤駭人聽聞吾試問子所搜羅之書為西醫書乎為中醫書乎若皆西醫書則直改為西醫學校可也何必徒冒此中醫之名若系中醫書則中醫歷代名家未有舍陰陽五運而言醫者子既曰廢除陰陽五運又曰搜羅歷代醫書此言實自相矛盾至陰陽五運不知者以為迂遠知之者以為神明之用正在於茲也陰者質陽者神神即氣質即形五行之運在天為無形之氣在地為有象之形在人為有形有氣欲察人身之病形與氣不可偏廢西醫重解剖只能驗死尸之形人死則氣散不能見生人之氣中醫知陰陽五運既能洞察生人之形又能洞明生人之氣此中優劣不辨自明特恐子粗心浮躁不肯細心研究徒冒優者之名泛鶩劣者之賣則自求舍勝而處敗吾實為子悲也又問曰陰陽二字中醫之門面話身半以上為陽身半以下為陰表為陽里為陰以言乎內五臟屬陰六腑屬陽細繹前言殊難洞悉底蘊何以同此軀幹有身半以上為陽身半以下為陰之別何以有表為陽里為陰之別同居膜原之內何以有五臟屬陰六腑屬陽之分陰陽二字愈沿愈多甚至各臟分陰陽各腑又分陰陽求之真理無可證明伏望夫子發宏論一一條分縷析以釋生疑答曰子以陰陽二字為門面話我以子此言為門外漢天下惟門外漢不知內容之美富但於門外徘徊只看見一門面故僅知門面而已若欲執門外漢而告以內容是猶執盲人而語美景恐盲人未必能信然吾終不忍不言而使子終身徘徊於門外也何謂陰陽陰陽者即周易所謂兩儀也太極生兩儀兩儀生四象四象生八卦八卦生八八六十四卦推而至於一名一物無一能逃陰陽二字之中散則為萬殊合則為一體此易理也醫理通於易理故醫者不能廢陰陽以言學但此只可為知者道不足為門外人言也今子既有問吾且就至淺至顯者言之姑為盲人引路至於能入門與否權在學者自操我不能強也子雖不知陰陽子豈不知明暗乎一日之間自朝至暮明也自晚至曉暗也暗即陰明即陽此固盡人知之者也身半以上嚮明身半以下向暗表在表面嚮明里在裡面向暗五臟屬於里故向晴六腑屬於表故嚮明六微旨大論云天樞以上天氣主之天樞以下地氣主之人身應天地故人之腰猶天之樞腰以上天氣主之故身半以上為天為陽腰以下地氣主之故身半以下為地為陰肝之腑膽也故肝與膽相表裡脾之腑胃也故脾與胃相表裡肺之腑大腸也故肺與大腸相表裡心之腑小腸也故心與小腸相表裡心包絡之腑三焦也故心包絡與三焦相表裡腎之腑膀胱也故腎與膀胱相表裡六腑皆表也五臟皆里也表為陽里為陰故六腑皆屬於陽五臟皆屬於陰此乃最淺最顯之道何待細繹而始知底蘊何至無真理可證明此等極淺極顯者之理子尚不能明曉若語子以天地之大萬物之衆各有陰陽子有不頸縮舌伸嚇得汗流夾背乎故吾不敢驟語子以高深姑再另用至淺至陋之説以為引喤希望子有茅塞頓開之一日試分條如下一西醫不言陰陽專以形氣立説抑知形氣即陰陽也例如彼言氧氣能養物取水銀白礬硝石燒之氧氣即出能養百果羹肉皆不壞不知此即中國所謂陰氣也中國以冰養果羹即取其純陰不化水銀等亦純陰故多養氣耳又化學言人吸空中氧氣而活空中之氧氣即中醫所謂天陽也然則同一言陰陽不如中醫以陰陽兩字括之為言簡而意當一西洋天學言空氣有冷熱相吸而成風夏月熱帶在北則風從南至冬月熱帶在南則風自北來中醫曰東方生風風生木南方生熱熱生火西學言風之南北是陰陽兩異也中醫言風自東方是陰陽交應也同一不外陰陽不如中醫言陰陽之直捷通快一化學以鋼擊石所生之熱與鋼煉磨下石屑與空中氧氣化合而燃鑽木相磨亦與空中氧氣化合而燃是氧氣雖生於金石實無非陽氣陽氣者無形之氣金石者有形之質質與氣即中醫所謂陰與陽也一格致學謂草木自根芽子核而生泥土是物質腐爛而成不知草木雖有根芽非風噓雷鼓不發泥土雖由腐化非濕氣熏蒸不爛是即中醫所謂風生木濕生土也一西人謂水是氫氧氣所化以冷玻璃罩之則與空中氧氣化合為水珠放水銀盆內燒之復化為水然則冷玻璃與水銀皆寒性物也與中醫寒生水之義實相通以上各條即中醫所謂五運六氣西人雖不言五運六氣之陰陽而何一不在五運六氣陰陽之內特西人言之而不能知之中醫知之而兼能言之耳然此皆至淺至陋之説也若語高深尚宜徐徐以待子之進步焉張豪問曰五臟井榮腧經合共五十五穴生聞之矣維此五者有不依穴道次序而行何也例如足厥陰肝經井大敦也榮行間也腧太衝也而合則在曲泉其間尚越有蠡溝中都膝關三穴諸如此類不勝枚舉且此五穴其性質是否盡同抑是各異再此五穴與吾人之身體有無特別之關係乞夫子垂教焉答曰此五者不依穴道次序而行卻是性質不同卻是與吾人身體有特別之關係也靈樞九針十二原篇云經脈十二絡脈十五凡二十六氣以上下所出為井所溜為榮所注為俞所行為經所入為合二十七氣者即經脈十二絡脈十五合而為二十七也經所謂以上下者言二十七氣藉此井榮腧經合諸穴以行上下也此即子所謂特別關係耳其始出之穴為井井者為山下之井泉始出氣正深也水從此而流則為榮榮者急流小水也又從此而注則為俞腧者灌注而輸運之也又從此經過之則為經經者脈氣大成也又從而有所會則為合合者入合於內也此非即子所謂性質不同者乎惟出於井流於榮注於腧行於經入於合始二十七氣由內而外由外而內循環不已其關係於吾身者豈淺鮮乎是以不能與他穴同依次序而言也又問曰夫肺主氣心主血脈而何以寸口尺脈屬於手太陰肺經以之候全身之疾病何也人身十二經脈惟手太陰肺經能動而他經則否何也凡耳門囟項腳股等處皆有動脈其起止正與寸口相符此是否即是肺經之脈抑系另有別經也胸口處以手捫之亦能跳動其起止亦與寸口相符且值競走之後或氣喘之時其胸口處跳必速而寸口之脈亦隨之而速又何也再此胸口之跳動是否即是肺動抑即俗語所謂心跳者凡上諸端願夫子開我茅塞答曰此一言可以明曉也肺朝百脈寸口屬手太陰為脈之大會故人身之動脈雖多而獨取乎此也難經第一難曰十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之法蓋以肺為諸臟上蓋主通陰陽故十二經脈皆會於手太陰寸口十二經有病見於寸口者知其何經之動浮沉滑澀春秋順逆可決其死生也至於耳門囟項胸口腳股各經均有動脈皆不能與此同論若競走跳動出於一時由激而成氣使然也更不可以同論矣又問曰出嘗觀江湖外科打針者其針深入而無血又不甚疼痛何也凡吾常人手足或皮膚偶被刀傷則血必涔涔然抑若全身無處無血者而在善針者施之則又若處處無血者是彼識穴道而常人不識穴道之別耳然生於此端不能無疑生嘗聞人言凡周身之肉皆血脈行走苟被阻滯者則必癰潰今觀此等穴針刺而無血則此處之無血可知既無血則該處何以不癰潰此所以敢問於夫子者也答曰江湖外科之學吾卻不知但內經針法本有出血出氣兩法出血者有血出氣者無血也素問血氣形志篇云刺陽明出血氣因其多血多氣也刺太陽出血惡氣因其多血少氣也刺少陽出氣惡血因其多氣少血也刺太陰出氣惡血因其多氣少血也刺少陰出氣惡血因其多氣而少血也刺厥陰出血惡氣因其多血少氣也因血氣之多少以分別出血出氣放出血者有血出氣者勿使其出血耳呂夢祥問曰飲酒雖云衛氣先行皮膚先充絡脈衛氣既平始及經脈然世界上有一種人往往飲酒甚多而麵皮並不發有紅色絡脈經脈似若不飲酒之人一般所飲之酒化於無何有之鄉其故究安在哉答曰經云飲酒者衛氣先行皮膚先充絡脈是以面先赤而小便獨先下此蓋指普通體氣而言也他若偏陰偏陽或虛或實臟腑經絡各各有倚於一偏者或此虛彼實此實彼虛體氣遂因之而異飲酒後因體氣之各異遂各走各經自不能一概而論經所言者常也子所見者變也豈可拘執不化乎又問曰竊觀手太陰肺脈起於右寸氣口手少陰心脈起於左寸氣口何以靈樞經脈篇經絡之辨一章曰氣口者手太阻之兩脈口也究竟肺脈候在左寸氣口乎亦候在右寸氣口乎抑亦候在兩氣口寸脈乎其確定部位在何處也答曰靈樞經脈篇經絡之辨一章所以辨明經脈絡脈之隱現不同也彼所謂見於氣口者蓋為十二經脈之穩而不可見非比十五絡脈之顯而見欲知其虛實須辨手太陰之兩脈口故曰經脈者常不可見其虛實也以氣口知之張注云氣口概寸關尺三部而言人迎氣口則知兩寸口也至於診法古今卻有不同古有頭面手足遍診之法內經仲景皆以人迎趺陽合診故難經三部九候與內經三部九候之法亦有不同然頭面手足遍診之法其廢已久今皆從難經寸關尺為三部三部各有浮中沉為九候亦去繁就簡之意耳又問曰四君子湯治面色痿白言語輕微四肢無力脈來虛弱及內傷虛寒凡一切因於氣虛者固為相宜何以又曰治飲食難化作酸痞悶噦嘔等症夫飲食難化作酸痞悶噦嘔等症系現有形邪實氣滯若投以四君子深恐中宮愈加壅滯蓋益作脹不思飲食等症叢生矣然古人用藥必有深意非井窺之見所能知其萬一也但讀至此轉輾思維頗有所疑究竟氣虛兼飲食難化作酸痞悶噦嘔等症可否用此以治之答曰四君子湯乃手足太陰足陽明藥也人參甘溫大補元氣為君白朮苦溫燥脾補氣為臣茯苓之甘淡滲濕瀉熱為佐甘草甘平和中益土為使氣足脾運飲食倍進則餘臟受蔭以治飲食難化作酸痞悶噦嘔等症何嘗不宜雖然亦當臨時斟酌審其病情有無他症及外邪夾雜在內通權達變隨時加減方不誤耳假如氣逆則當加陳皮以理氣散逆即名異功散若氣虛有痰脾虛鼓脹再加半夏名六君子湯若虛寒胃痛或腹痛泄瀉再加砂仁香附名香砂六君子湯若四肢不舉則脾屬四肢再加麥冬竹瀝若虛熱潮熱身體倦怠則用六君子湯加柴胡葛根黃芩白芍以治其熱名十味人參湯若五臟氣虛七情兼併結聚痰飲與衛氣相搏發為瘧疾則用六君子湯加烏梅草果及薑棗以和四樁而補脾即名四獸飲此外舉一反三隨機應變或加或減均可以此類推豈可執一而不化哉又問曰臟腑之脈配於左右寸關尺諸家聚訟紛紛內經謂左寸外以候心內以候膻中左關外以候肝內以候膈左尺外以候腎內以候腹右寸外以候肺內以候胸中右關內以候脾外以候胃右尺外以候腎內以候腹王叔和謂左寸以候心與小腸左關以候肝膽左尺以候腎膀胱右寸以候肺大腸右關以候脾胃右尺以候命門三焦李瀕湖謂左寸以候心膻中左關以候肝膽左尺以候腎膀胱小腸右寸以候肺胸右關以候脾胃右尺以候腎大腸張景嶽謂左寸以候心膻中左關以候肝膽左寸以候腎膀胱大腸右寸以候肺中右關以候脾胃右尺以候腎小腸不知孰是孰非答曰吾不敢妄非古人吾且述古人之非古人者為子道之素問脈要精微論云尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上右外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也張氏云此乃分明上以候上下以候下為本經不易之理而王氏脈經乃謂心部在左手關前寸口與手太陽為表裡以小腸為腑合於上焦肺部在右手關前寸口與手陽明為表裡以大腸合為腑合於上焦以致後人遂有左心小腸右肺大腸之配下反居上其謬甚矣據其所云不過以臟腑之配合如此耳抑知經分表裡脈自不同例如脾經自足而上行走腹胃經自頭而下行走足升降交通以成陰陽之用又豈必上則皆上下則皆下而謂其盡歸一處那且自秦漢而下未聞有以大小腸取於兩寸者扁鵲仲景諸君心傳可考自晉及今乃有此謬以訛傳訛愈久愈遠誤者可勝言哉此之不經雖出於脈訣之編次而創言者謂非叔和而誰以上皆張氏之言也吾為子述之子自能恍然焉又問曰六經中手厥陰心包絡一經而脈候配置部位並不提及而反配在六經中之膻中此何故歟或心包絡一經受邪無從診察矣答曰膻中即心包絡也經云膻中為氣海是指肺而言也又曰膻中為心主之宮城是指心包絡而言也膻者膈也膻為膈包絡居膈之中故曰膻中胸下一層膈膜後著脊左右連筋骨盡處中連胸之鳩尾即膻是也膻之下層通腹中膻之上層為胸內之薄膜連心系名包絡又名心主包絡是心外衛膻中是包絡外衛究膻之根附脊骨與肝系相連而下乃連及腎系是三焦少陽所發出而布於膈也又問曰陰虛陽盛火亢咯血一症講義云用四生丸以治之閲陳修園張景嶽輩用八味丸鎮陰煎以治之內皆有附子肉桂之辛熱謂龍雷之火得水而愈熾惟桂附辛熱之品而取其引火歸原導龍入海之義同一是病而寒熱溫涼大相懸殊此何故歟答曰用四生丸以治咯血者所謂急則治其標也用鎮陰煎八味丸以治咯血者所謂緩則治其本也陰虛陽盛非滋陰不為功陽盛火亢非引火歸原不見效此治本之一定理也然急則治標不得不用四生丸以暫遏其妄行之血故下文云如多用則反有傷蓋血逢寒則凝若過用寒涼則凝不散新不生反致害矣語云醫者理也診者審也醫生治病總當審病察理隨機應變如膠柱鼓瑟拘執古方偏於涼偏於熱未有不誤也余偉問曰素問病能篇曰氣逆者人迎甚盛甚盛則熱人迎者胃脈也考人迎穴亦胃陽明經之脈通胃者右關也素問五臟別論曰五味入口藏於胃以養五臟氣氣口亦太陰也又曰五味皆出於胃變見於氣口靈樞根結篇曰五臟皆受氣持其脈口數其至也又脹論曰脈之應於寸口此三者皆指寸關尺總稱之名也三部分之三者皆指寸部也後人論人迎氣口紛紛不一至李士材獨辨左關人迎候肝風右關氣口候胃食又云古人有兩法兩手分之左人迎右氣口一手分之右寸肺人迎右關脾氣口此言與經冰炭相反是乎非乎答曰參考答呂夢祥所問脈配左右兩條便知毋庸重言也要之諸家之説發明經旨所未發者固多而誤者亦不少學者決擇宜精方不至誤昔馬元臺曰嗚呼秦張王李朱諸先輩為後世業醫者所宗仰而尚不能深得經旨況其下乎張介賓曰馬子之言誠是然觀其諸篇之注則亦有謬者元臺哀前人之誤而余哀其誤使後人更有哀吾誤者所謂後人而復哀後人也吾嘗曰後人復哀後人正醫學之逐漸進步耳又問曰靈樞脈度篇曰陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣弗能榮也故曰格難經三十七難曰陰氣太盛陽氣不得相榮也故曰格陽氣太盛陰氣不能相榮也故曰關前聖後賢者多不同當以何説為主答曰靈樞脈度篇所言關格義甚顯明本無疑竇所謂陰盛陽盛者言邪在腑則氣留之而陽勝陽勝則陰病陰病則血留之而陰勝陰勝則陽病故陰氣太盛則陽氣不榮而為關關者關六陽之氣在外而使之不能入於內也陽氣太盛則陰氣不榮而為格格者格六陰之氣在內而使之不得出於外也此固甚為明白而難經三十七難自首至末皆靈樞脈度篇原文關格二字陰陽倒置證之素問六節藏象論靈樞終始諸篇經文並無陽盛為格陰盛為關之説顯系難經之誤徐氏謂難經傳寫之訛亦甚有理學者自當以靈素兩經為主又問曰靈樞禁服篇云寸口主中人迎主外此説未解何意也下文又曰春夏人迎微大秋冬寸口微大如是者名曰平人又終始篇曰人迎四盛且大且數名曰溢陽溢陽為外格脈口四盛且大且數名曰溢陰溢陰為內關下文又以人迎盛瀉陽補陰脈口盛瀉陰補陽此以人迎應陽寸口應陰者乎答曰寸口主中者寸口系太陰之脈屬陰屬裡也人迎主外者人迎系陽明之脈屬陽屬表也歲半以上為陽歲半以下為陰春夏主生長故為陽秋冬主收藏故為陰陽時見陽脈陰時見陰脈是謂脈與時不相反故曰平人人迎四盛且大且數名溢陽為外格者言陽盛而溢於外所以格六陰之氣於內而使之不得出也脈口四盛且大且數名溢陰為內關者言陰盛而溢於內所以關六陽之氣於外而使之不得入也故人迎過盛當瀉陽補陰寸口過盛當瀉陰補陽此即人迎應陽寸口應陰之義也張豪問曰同身寸量經脈穴道人有長短有肥瘠使短而肥者或長而瘠者則同身寸不能盡其用也且同身寸以長短為比例乎抑以肥瘠為標準乎使其以長短為比例則必不能合於肥瘠以肥瘠為比例則必不能合於長短敢問如何答曰靈樞經脈篇云骨為幹脈為營肉為牆骨猶樹也脈猶藤也脈之於骨猶藤之營附於干也故欲量經脈穴道當先量骨之長短知骨之長短即知脈之長短而肉則不過如牆之外圍其肥瘠與量度無關係也故靈樞骨度篇云頭之大骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸結喉至缺盆四寸缺盆至骬𩩲九寸𩩲骬至天樞八寸天樞至橫骨六寸半橫骨至內輔骨一尺八寸內輔骨上廉至下廉三寸半內輔骨下廉至內踝一尺三寸內踝下至地三寸膝膕下至跗屬一尺八寸跗屬下至地三寸此皆指骨度長短而言而肉之肥瘠無與也不然何以胸圍反大於腰圍乎蓋胸圍之四尺五寸指胸骨而言腰圍之四尺二寸指腰骨而言而胸腹間之肉不與也即如靈樞脈度篇所云手六陽從手至頭五尺手六陰從手至胸三尺五寸足六陽從足至頭八尺足六陰從足至胸六尺五寸蹻脈從足至目七尺五寸督脈任脈各四尺五寸共合十六丈二尺者亦但指經脈之長短而言而於肉之肥瘠無關係焉子既欲合骨度與脈度之長短又欲合肉之肥瘠所以惑耳又問曰有患目疾者其眼下簾腫赤隆起不治且將出膿吾鄉名之曰天貞杭俗呼之曰偷貞針是雖小疾然亦頗不便於事故吾鄉治此症之法如左目患此則以線繫於右手無名指本節上右目患此則以線繫於左手無名指本節上轉輾打七結至次日即消矣生屢患此疾而屢以此法治之未嘗或爽也有人謂此乃迷信生謂此決非迷信苟迷信斷不能奏效若是之靈此殆有經脈相通於其間乞夫子垂教焉答曰此非迷信乃古人治病之簡易法也此等簡易法古今方書所載甚多不可枚舉即如醫方指掌所載治鼻衄不止一法用線札中指中節左孔出血札左指右孔出血札右指兩孔出血札兩指血即止治乳蛾喉痹法以發繩札大指針刺指甲縫邊出血喉即寬皆與此同類也至於經脈卻有相通夫名指本節之上乃三焦液門中渚之間也是經之脈起於關衝而上液門中渚直至目鋭眥會瞳子髎循絲竹空而終此即經脈相通之明證也鄒廷銓問曰邪氣之客於人身有同一時也同一邪也在症不同脈象相反者假如同傷於秋之燥而咳嗽一為頭痛惡寒鼻塞嗌乾痰無汗脈弦苔白一為口渴發熱目赤齦脹咽疼痰黏甚則喘而失血脈洪苔赤二病傷邪則同現症迥異考之書中止言正化對化之別並無載其正化對化之詳理望夫子明示之答曰正化對化乃運氣學中之一也吾嘗言醫者不可不知運氣學正為此耳今子因運氣未講到此故不能知將來講到自能恍然今既有問吾且與子言其大略夫同一病而春夏秋冬現症迥異者時為之也同一病同一時而現症不同者氣為之也何謂氣氣即六氣之正化對化也六氣分上下左右而行天令十二支分節令時日而司地化然以六氣而加於十二支則有正化對化之不同例如厥陰之所以司於巳亥者以厥陰屬木木生於亥故正化於亥對化於巳也少陰所以司於子午者以少陰為君火當正南離位故正化於午對化於子也太陰所以司於醜未者以太陰屬土居中旺於西南未宮故正化於未對化於醜也少陽所以司於寅申者以少陽屬相火位卑於君火生於寅故正化於寅對化於申也陽明所以司於卯酉者以陽明屬金酉為西方金位故正化於酉對化於卯也太陽所以司於辰戌者太陽為水辰戌屬土然水行土中而戌居西北為水漸旺之鄉是以洪範五行以戌屬水故正化於戌對化於辰也正司化令之實對司化令之虛正化從本生數對化從標成數皆以言陰陽之盛衰合於十二辰動靜消息者也因正化對化之不同故其為病也傷邪則同而現象迥異耳附圖於下又問曰十二經脈俞穴繁多多者竟達至六十以上少者亦不下十餘讀靈樞本輸篇以井榮俞經合代五臟之穴井榮俞原經合代六腑之穴例如足太陰脾經以隱白為井大都為榮太白為俞商邱為經陰陵泉為合其餘之穴繁多何以不配公孫三陰交等穴而獨配此五穴者何故此種原因生尚未明乞夫子示之答曰此非五臟六腑之俞乃五臟六腑之井榮腧經合穴也五臟六臟之腧在背此乃手不過肘跗不過膝也因手足為人之四末人之四末猶樹之梢抄人身血氣之出由臟腑而脈由脈而絡由絡而孫絡出於四街復由此井榮俞經合而入故曰井者如山下之井泉始出氣尚微也榮者如急流小水氣未盛也腧者輸也由此輸彼氣漸盛也經者行也言行已大盛也合者入也言由此而入合於內也故人身血氣由內而外由外而內循環不已周而復始如環無端也五臟無原遇原則腧代之六腑有原遇原腧並過之此又五腧之合於五行者也豈有別種原因哉呂夢祥問曰脈理一節前賢論之詳矣謂三部九候可以決死生處百病調虛實窈思兩手之脈左右只各一條何以有六脈何以有九候且脈本系一血管通乎寸口豈能以區區寸口別萬緒千端之病乎答曰此言與前日子所問廢陰陽五運及以陰陽為門面話等説同一出於西醫之言也西醫不知五運故以五運為虛渺西醫不知陰陽故以陰陽為門面話西醫不知脈法遂謂人周身皆有動脈何獨以手為診不知中國古人創立脈法先已自為問答抑若逆料西醫必有此説特設為問答以代西醫言之者也難經首問即曰十二經皆有動脈獨取寸口以決五臟六腑死生吉凶之法何謂也答曰寸口者脈之大會五臟六腑之所終始故法取於寸口也此蓋言肺為華蓋朝百脈五臟六腑之氣皆上通於肺寸口及肺之動脈與五臟六腑相終始故法取寸口也西醫不知脈法謂脈管本系一血管血出心管行於周身周身脈管皆生於心中血管心體跳動不休脈即因之而動人身五臟何得只據血管為斷遂可以決死生處百病調虛實且曰手脈只是一條何得分出六脈何得分為三部九候且豈能以一寸口別萬緒千端之病乎不知脈雖一條有分散合聚隱現之別寸口者脈之大聚會處為營衛相會之要區故即此以診諸病也西醫但知脈是血管不知脈管內屬血分脈管外屬氣分氣附脈行血管外即氣通也西醫謂脈外有膜名脈鞘光滑而薄分數層中有小孔如篩按此即附脈而行之氣孔也脈管只是一條動則俱動故遲數無部位之分氣則上下異其輕重也所以浮沉有三部之別從此類推而氣管血管分診合診脈無遁情矣故不在者以為渺無可憑知之者以為確有可據也何錚問曰三焦無狀空有名夫三焦之脈不宜候之右尺今三焦既無形狀何以候之右尺經曰精理薄皮者三焦薄密理厚皮者三焦厚又曰上焦如霧中焦如漚下焦如瀆此明明以上中下分三焦也靈樞經脈篇曰三焦起自關元而終絲行空左右凡四十六穴於此觀之則有名有狀矣而脈訣謂無狀空有名者令人不解幸請夫子教之答曰參考左冠章所問三焦有形無形一條便知毋庸重説也又問曰女子二七而天癸至任脈通月事以時下果矣然未至二七任脈不通任脈不通則奇經八脈行將少一脈豈非成奇經七脈乎請吾師示之答曰所謂不通者氣未盛脈未通耳非少一脈也素問上古天真論曰女子二七而天癸至任脈通太衝脈盛月事以時下夫天癸者天一之氣也任沖者奇經之二也任主胎胞沖為血海氣盛脈通故月事下月事者言按月而至其盈虛消長應於月象經之應月陰之所生也世人每以精血為天癸不知癸者天之水干之名也乾者支之陽陽所以言氣癸者干之偶偶所以言陰故天癸者言天一之陰氣耳氣化為水故名天癸天癸先至精血繼至故經云女子二七而天癸至任脈通太衝脈盛月事以時下男子二八腎氣盛天癸至精氣溢寫是必先陰氣足而後精血化先至後至自有別耳然則天癸者人身之元陰亦即所謂元氣也人之未生其氣蘊於父母為先天之元氣人之既生則此氣化於吾身為後天之元氣第氣之初生真陰甚微及其既盛精血乃旺故女必二七男必二八而後天癸至天癸至然後陰血足而精血化耳子欲以八脈少一脈為七脈誠千古未有之奇談也何其愚哉又問曰包絡即膻中膻中即包絡明矣然靈樞經脈篇當以包絡為是內經十二官以膻中為是認包絡而書中膻中不宜載認膻中包絡不宜載今遍觀各書包絡膻中並載閲之易起疑慮究重包絡歟重膻中耶願夫子斷之答曰膻中包絡體雖一而用則二也膻乃胸前大膈膜膻中即胸中胸中只有心包絡與肺素問靈蘭祕典論曰膻中者臣使之官喜樂出焉膻乃膈膜何以能為臣使之官何以能出喜樂此蓋指膻中之心包絡而言也經又曰膻中為氣海氣海者氣之出納處也膻乃膈膜何以能司氣之出納氣之出納在乎肺所謂氣海主氣之出納者蓋指肺而言也包絡與肺均在膻膈之內故皆可名膻中但以心包絡而言則膻中為心包絡之宮城以肺而言則膻中為肺之氣海故曰體雖一而用則二也又何所謂重不重乎又問曰何以成男女閲祕主衛生篇曰男子欲火旺則成男女子欲火旺則成女其果然耶抑誣言耶答曰此説固非即諸家所説亦多不當北齊諸澄曰男女之合陰血先至陽精後沖血開裹精精入為骨而男形成陽精先入女血後參精開裹血血入為本而女形成此一説也王太僕曰男女有陰陽之質不同天癸則精血之形亦異此一説也馬元臺駁之曰男女之精皆可以天癸稱今王氏以女子之天癸為血則男子之天癸亦為血耶李東垣曰經水斷後一二日血海始淨精勝其血感者成男四五日後血脈已旺精不勝血感者成女朱丹溪曰精勝其血則陽為之主受氣於左子宮而男形成精不勝血則陰為之主受氣於右子宮而女形成此又一説也丹家為天壬先至地癸隨至癸裹壬成男地癸先至天壬隨至壬裹癸成女壬癸齊至成雙胎一遲一速不成胎此又一説也然而以上諸説紛紛不一實則皆非也夫乾坤之氣通在中和故天地位而萬物育人能寡欲清心得天地中知之元氣不特所生多男抑且所得之男佳而多壽否則不特所生多女即所生之女亦劣而多夭也又問曰天地化物造物好生小兒本無病也其後有原急驚者有原慢驚者此種奇疾甚至性命不保莫非天付之乎或者人自為耶亦乞夫子明以教我答曰小兒雖無七情六欲積痼癡頑之病然而外感風寒內傷飲食以致驚風吐瀉及寒熱疳癰之病皆不能免此幼兒一科為醫者所以不能不學也至於命之夭壽雖定於天而斡旋造化起死回生未嘗非醫生之天職古人名之曰啞科以其言語不通病情難詢故曰寧治十男子莫治一婦人寧治十婦人莫治一孩子此蓋甚言幼科之難也然而小兒致病之原不外風寒飲食凡外感者有表證而無里證為發熱頭痛拘急無汗或因風搐搦之類是也內傷者只有里證而無表證為吐瀉腹痛脹滿驚疳積聚之類是也熱者必有熱證如熱渴煩躁祕結癰瘍之類是也寒者必有寒證如清冷吐瀉無熱無煩噁心喜熱者是也所病惟此數種而其臟氣清靈隨撥隨應苟能確斷其症而治之一劑即可見效否則虛實不辨審斷不確妄行攻擊則嫩弱之體質未充之氣血柔脆之臟腑略受傷殘萎謝立見亦一劑可以送命也庸醫殺人而欲歸咎於天也可乎哉此學醫者所以不可不知也樓餉周炳章問曰考寸關尺三部之脈俱在肺脈之一經何以此脈各有所候於臟腑豈各臟各腑之氣血行至此而竟各自絶然灌注耶是竊有疑焉願夫子明教之答曰難經第一難曰十二經中皆有動脈獨取寸口以決五臟六腑死生之法何也然寸口者脈之大會手太陰之動脈也人一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸人一日一夜凡一萬三千五百息脈行五十度周於身榮衛行陽二十五度行陰二十五度為一周會於手太陰寸口者五臟六腑之所終始故法取於寸口也夫榮氣之行始於手太陰肺終於足厥陽肝而復至手太陰肺衛氣之行晝行於陽夜行於陰各行二十五度而復於肺而營氣衛氣大會於肺蓋五十度而陰陽之數已行盡而營衛皆會於肺故名大會而與臟腑相終始也因其會於肺所以肺脈可診臟腑諸病耳且肺為華蓋五臟六腑之氣皆熏於肺則肺脈可以診知各臟腑之病也不亦宜乎張沅問曰岐伯有云女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下故有子但婦人年未至七七而天癸絶竟致不孕者世醫以為血枯是乎否乎答曰經云女子二七而天癸至七七而天癸絶有子無子即判於斯此乃天地陰陽消長盛衰之常理也至於未至七七而天癸絶不能孕卻是血枯所致然病不一端或由氣道逆而不行者有之精血敗而不行者有之或由鬱怒或由積勞或由六淫飲食或由外感內傷或由七情六欲或由於血氣方長縱情虧損或由於精血未滿先已斫傷卒至精血日涸而衝任氣竭者亦有之種種病因不一而足似不可以血枯二字盡之也為醫者苟審病不精則用藥謬誤後患可勝言哉又問曰三焦何以為孤府答曰參觀答左冠章問三焦有形無形朱慶熙問心包絡與三焦為表裡二條便知毋煩重説也又問曰婦人年不逾五七而天癸不至腹中結塊似孕而實非孕有時能動動時腹作疼痛每易致病世醫以為血不足皆以活血之劑治之不能應效此病當以何法治之答曰同一病而原因不同病之現狀不同豈可懸擬治法然子既有問吾姑舉一端與子言之吾昔年在武康曾治一婦人繫上柏人年二十餘歲夫死年餘經停腹漸脹大及八九月之久腹大如懷孕十月滿足者人皆疑以為孕遍就各醫未能決其是否來就余診余曰此非孕也腹中有一物大如胎而狀非人形在腹中能動出腹便不能動矣此乃由經行時鬱怒所致而淤血結成也衆皆疑吾言為誑惟患者點頭曰先生能使我出此物乎吾曰物可出但恐命不能保奈何患者曰寧死不怨余因細察其脈象並觀其面色聽其聲音知其病雖深而元氣尚足斷定尚不致死乃用猛攻之劑並囑其服後防血崩宜留意是夕夜半腹陳陳作痛如臨産五更血崩其物隨血滾下形狀顏色確肖一極大豬肺惟獨少氣管耳乃一大血塊也於是群疑皆釋而患者來復診又服藥調理而病遂愈焉但此等症候必須審證精確知其虛實方可用藥否則失之毫釐謬以千里矣駱祖馨問曰組織學所為穴道者其位置不過言距某處幾寸幾分為某穴復自某穴距幾寸幾分為某穴今夫人之年齡有長幼之分身體有長短之別則穴道之位置其必有相差之異雖然幾寸幾分者言距離之大約也假令人之長者其臂長一尺六寸短者之臂其長一尺二寸若一臂間有甲乙丙丁戊如是五穴其距離均系三寸之數則臂之長者固三五十五寸計之有餘一寸矣今臂之短者則三五十五寸計之不足二寸矣此同身寸之所以適用也然如余之身短與同學中之身寸長者以同身寸較之反余之同身寸較彼為長是則同身寸亦不盡適用此外尚有他法以量之乎答曰量穴之法原不僅同身寸同身寸特其一耳其他有非同身寸所能適用者量法甚多有用尺量者有用草量者尺量則有夏尺商尺周尺鈔尺銅尺曲尺黍尺之別黍尺中又有縱黍橫黍斜黍之分更有非尺量所能適用者則用草量草量者三角形量法也素問血氣形志篇曰欲知背俞先度其兩乳間中折之更以他草度去半已郎以兩隅相拄也乃舉以度其背令其一隅居上齊脊大椎兩隅在下當其下隅者肺之俞也復下一度心之俞也此即三角形草量之法耳子只知同身寸而不知其他所謂坐井觀天而以天為小者也又問曰夫人身之血脈盡日流行不息若一處之血氣停滯不動則此處之肌肉麻木今如吾人終日坐於座上而不行動則兩足之肌肉麻木難耐蓋吾人干夜間睡時人亦眠而不動何以肌肉不麻木乎答曰臥豈可與坐比哉長坐而少運動則血氣凝滯不能流行周身故足中肌肉麻木若睡時則人雖不動而血氣流行如環無端故靈樞營衛生會篇曰夜半而大會萬民皆臥命曰合陰又曰壯者之氣血盛其肌肉滑氣道通榮衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉枯氣道澀五臟之氣相搏其榮氣衰少而衛氣內伐故晝不精夜不瞑然則夜間之能睡正以徵血氣之盛夜間之不能睡正以徵血氣之衰也夜間之臥與日間之坐雖同一不動而豈可以一概論何真愚哉余偉問曰人參一味東垣言補氣補陽謂氣為陽此至理也以後諸家皆云純陽之性回陽之藥陳修園力辨補陰養陰謂味重干氣屬陰此亦至理也觀仲聖白虎加人參湯治若吐若下大汗出後渴不解用之補氣救液也四逆加人參治汗下亡血者經曰血氣異名同類奪汗者無血奪血者無汗故加參補氣即救血也其餘皆汗吐下利亡血後而加之未有回陽之用而諸家言參能回陽其説有誤乎生按人參味甘入脾氣平入肺子母相生肺為生氣之源故肺得補氣充矣肺為陰中之陽人參即陰中之陽藥也敢問是否答曰所見極是惜乎子只知脾為肺之母肺為陰中之陽不知水為氣之母氣為水中之陽耳按人參一物或謂補氣屬陽或謂生津屬陰或謂回陽皆因但論氣味而不究人參所由生之理故不能定其性耳考人參古生上黨故名曰黨參今生於遼東樹林陰濕之地又有人種者亦須在陰林內植之夫生於陰濕秉水陰潤澤之氣也故味苦甘而有汁液發之為三丫五葉陽數也此苗從陰濕中發出是由陰生陽故於甘苦陰味之中饒有一番生陽之氣此氣可嘗而得之者也人身之元氣由腎水之中以上達於肺生於陰而出於陽與人參由陰生陽同一理也所以人參大能化氣氣化而上出於口鼻即是津液人參生津之理如此非徒以其味而已即以氣味論甘苦中含有生髮之氣亦只成為由陰出陽之氣味耳須知人參不生於東南而生於北方者此正人參所由生之理也不究及此尚難得人參之真性何以故蓋北方屬水於卦為坎坎卦外陰而內陽人參生於北方正是陰中之陽也坎卦為水天陽之氣皆發乾水中譬諸西醫所用之蒸溜器以火煎水則氣出而氣者著於物又復化而為水知水為氣之母氣從水而出矣人身腎與膀胱屬水水中含陽化氣上行出於口鼻則為呼吸充於皮毛則為衛氣只此腎與膀胱水中之陽化氣而充周身者也故內經曰膀胱者州都之官氣化則能出矣此與天地水中含陽化而為氣以周萬物本屬一理水在五行屬北方人參生於北方秉水中陽氣故與人之氣化相合故大能補氣此即所謂水為氣之母氣為水中之陽也又問曰本草經白芍味苦平無毒主治邪氣腹痛除血痹破堅積寒熱利小便止痛未有言補而宋元以下諸家本草皆言味酸收陰氣斂逆氣和血補陰與本草經大相反觀仲聖桂枝湯解表之劑取其平入肺泄邪氣取其苦制桂之過辛小建中湯治腹中急痛取其味苦為君疏脾中之邪氣泄腹中之淤以合本草經之旨也生入肆中試嚼之果苦而無酸味矣而宋元以下諸家皆變苦為酸其故何耶又陳修園曰張隱菴言赤芍白芍花異根同其實是花赤白分之其根同也余見土人採藥囊中不知何物之根詢之云肆中所售之赤芍即此也生觀藥肆之赤芍白芍果大異陳氏言赤芍不可用夫子以為可用乎答曰按本草經云味苦平無毒者因神農嘗草曰苦也宋元以下諸家言味酸者因雷公有味酸之説也其實味苦而不酸至於赤白芍謂花異根同説實有誤夫赤芍白芍之分實不在花之顏色而在草本與木本白芍即草芍藥赤芍即木芍藥草芍藥色白而多脂亦名金芍藥木芍藥色紫而多脈花大而色深形如牡丹故俗呼為牡丹而實非牡丹也子所見為大異者蓋白芍系草本赤芍系木本也陳氏所謂赤芍不可用者蓋指草本者而言非指木本者而言也王廣蔭問曰營衛生會篇云衛氣行於陰二十五度行於陽二十五度故氣至陽而起至陰而臥然則人往往日間投入睡鄉亦成好夢不卜何氣使然豈人臥時衛氣則行於陽乎若然則無日夜之分矣敢請答曰衛氣之行關於日夜非關於臥不臥也所謂氣至陽而起至陰而臥者指日起夜臥者而言非指日不起夜不臥者言也人在日固當起在夜固當臥如陰陽反覆夜以當日日以當夜不特衛氣不能分陰陽而行即營氣亦不能循經而行且營衛二氣又何能相會合久而久之未有不致病而不得盡期而死也故靈樞營衛生會篇云壯者之氣血盛肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰肌肉枯氣道澀其營氣衰少而衛氣內伐故晝不精夜不瞑然則老人之晝不精夜不瞑者血氣使然限於天也壯者之夜不臥而日臥者非血氣使然戕於人也戕於人有不病且夭乎余偉問曰藥之相惡相畏相反神農本草經以下至漢唐皆無此言而後人創此説而令學者之多惑生以為不然言人參畏靈脂如人氣虛有血積則當用靈脂破積人參固氣豈不可同用乎言黃連惡菊花玄參如喉瘡熱極等症心腎有實火者同用之有何不可乎古人往往以相反等藥同用之如神者究竟如何敢請夫子明示之答曰此説本草問答中早已有人論過吾且為子述之問者曰本草明言十八反十七忌十九畏宜恪守否答者曰性之反者如水火冰炭之不容故不可同用然仲景有甘遂甘草同用者又取其相戰以成功後人識力不及總以不用為是至於相畏可不必論相忌亦難盡拘然服麻黃細辛忌油膩服蜜與地黃忌蔥白服黃蠟忌雞肉此皆大不宜者皆所當忌不可不知以上所言皆前人之説非吾所創總之用藥如用兵或相戰以成功或前人已經驗或深知兵之性質決定無畔潰之虞可預操必勝之權然後兵可用而績可奏若欲以行險徼幸輕於嘗試作孤注一擲禍即隨之矣可不慎哉又問曰古人立方原為後人之規矩立言原為後人之宗師柯琴解四生丸言四味皆清寒之品豈非沒制方之規矩耶生按四生丸取生地甘寒色黑入腎清志中之火壯水精上行交於心其質似血入血涼血取荷葉苦寒一莖從水中直上通於心清君火以調榮取柏葉苦平入肺清金以調衛榮衛調和水火交通血涼而不上逆吐自止矣蓋三味皆寒滯之品妙在艾葉一味辛苦大溫芬芳純陽能走三陰和之以導諸藥領諸血各歸其經皆鮮用者取元汁是草木之血血入血也此方製法之神妙也經曰急則治標緩則治本故立此方暫時止吐衄之血也此意義是乎誤乎答曰非也夫彼曰凡草木之性生者涼而熟之則溫此言固不足為訓既用一凡字則所有草木均指在內卻不免言之太過但以此方而論四味固皆清寒之品也子但知生地涼艾吐溫而不知生地熟之則溫艾葉生用則涼也生地鮮用大寒生用涼血熟用微溫艾葉熟用則熱生用則寒本草綱目亦載有生寒熟熱之説而子未及見此遂妄議前人之非此少見者所以多怪也夫艾名冰臺亦名醫草所以名為醫草者以其得火而能灸病所以名為冰臺者以其得冰而能取火也柯氏所謂四味皆清寒之品者蓋指四味皆生用而言也故下文曰取其生者而搗爛為丸所以全其水氣不經火煮更遠於火令也至於急則治標緩則治本此方可暫用不可多用吾已與呂生言之詳矣又問曰生脈湯者孫真人制此方為暑月而設蓋暑熱傷氣氣傷則榮衛不固不固汗出而亡液氣短倦怠口渴作矣以上之症皆當補氣救液經曰虛則補其母故取人參味甘微寒入脾補土生金以為君臣以麥冬甘平而潤入肺瀉火清金其生用十二枚有十五十六枚似人之十二經十六絡能周行經絡調五行相從道人參補諸經之氣佐五味子重於酸味入肝斂風木之浮火其色赤黑五味皆俱得麥冬和之以入五臟收斂耗散之真氣氣斂則汗止而渴止矣三味合之補氣生津之劑孫真人未言生脈以後諸家因名誤解此方能生脈生見時醫往往遇陽脫無脈用此方加味治之殺人可數乎望夫子正之答曰此蓋由於子學力淺薄只知其一不知其二也在時醫不問何病遇脈絶輒用此藥固屬執一之見但彼之所以用此方者亦未嘗無因也雖此方主治本為暑月熱傷元氣氣短倦怠口渴多汗肺虛而咳者所設而方中皆手太陰少陰二經之藥肺主氣肺氣旺則四臟之氣皆旺虛故脈絶氣短也肺朝百脈心主脈補肺清心則氣充而脈復名之曰生脈非無故也脈主氣心主血是方以人參大補肺氣麥冬潤肺清心五味收斂五臟耗散之氣凡遇氣短脈絶而將死者是方實有起死回生之妙用故汪訒庵注是方曰人有肺絶將死者有此能復生之其功甚大即此一言可為明證子以為只能治暑熱傷氣不能生脈識見即自淺薄而笑時醫之謬是猶五十步笑百步耳又問曰內經候脈三部詳明而晉以下諸家各言一理使學者惑而無入門之路也生不敏悟內經之旨經以兩寸候心肺者位最高也以心候左寸者以心為一身之君主有四系發出貫於四臟心是陽中之太陽故候左寸也肺是陽中之太陰刺禁篇云肺氣生於右故脈候之右寸也以肝候左關者蓋肝位雖下肝之繫系於脾之上又是陽中之少陽為上下陰陽之中界故以候關刺禁篇云肝氣生於左故候之左脾是陰中之太陰為胃消化穀氣行津液陰土也位居中屬土故候之有關腎是水精刺禁云腎部為里位居直下是陰中之少陰腎有兩枚故候兩尺但言膻中與胃不言大小腸三焦膀胱膽與命門者蓋胃者陽土也存五味養五臟化生萬物與脾並居中州故可定於脾部也刺法論曰膻中者臣使之官喜樂出焉膻中即心包心包居心之外為心之宮城也心脈病即心包病心不能受邪故膻可定心部也大小腸雖與心肺相表其位居於下之小腹病有從表入里從里出表上下焦之氣所分不可概指一定三焦者上焦如霧中焦如漚下焦如瀆豈可定一部乎命門即腎不必多分名也膀胱合腎為表裡與大小腸俱居小腹如大小便之病有在闌門閉塞有在膀胱不化有在腎氣不化不可指定也右寸言胸中者候上焦之宗氣兩尺言腸者大小腸膀胱皆在內以候下焦之精氣左關不言膽而言膈者膽附肝之短葉屬少陽是陰陽之中界膈是上下之中界候膈即可為膽又候中焦之生氣也生之意度如此而後賢諸家以膻中三焦膀胱大小腸命門移上移下配左配右而沒內經之旨生之疑一也難經以明浮中沉候脈其言初持三菽之重與皮毛相得為肺脈者謂肺經最高為五臟之華蓋肺氣為衛其主皮毛也如六菽之重與血脈相得為心脈者心居肺下心氣為榮其主血脈也言如九菽之重與肌肉相得脾脈者脾居心肺之下肝腎之上為中土其主肌肉也言十二菽之重與筋相得肝脈者肝居脾之下其主筋也言重按之與骨相得腎脈者腎居直下藏精生髓其主骨也此理盡是而脈訣又不明此獨主寸關尺生所疑二也男女平脈之所異者是陰陽氣血之別也如男子左手脈盛於右女子右手脈盛於左經曰左右者陰陽之道路也男為陽主左女為陰主右者也經曰上竟上者胸喉中事也下竟下者少腹肢膝脛中事也上言寸下言尺也海論篇云膻中為氣海衝脈為血海男子寸脈常旺於尺者男為陽氣為主膻中氣海在胸中故脈應於寸也女子尺脈常盛於寸者女為陰血為主衝脈血海起於胞中在小腹故脈應於尺旺也生之臆斷如此而戴氏言脈訣背看之以男左腎右命以女右腎左命之説褚氏倒裝五臟言女心肺在下應尺肝腎在上應寸如此別之人身臟腑一定之部位豈可倒置乎生所疑三也以上諸疑皆因古人論説不同各執一辭使後學無所適從願夫子開一正路為學者入門而無誤焉答曰所論各節言多而中肯者少所疑三條尚有理由但子既欲我為學者開一入門正路我對曰宜從難經入門為正路按難經三部九候之法與內經三部九候之法不同內經有遍診頭足之法自越人變法而群趨簡易古法遂廢雖仲景尚有人迎趺陽合診而後世脈訣皆托始於難經去繁就簡不可謂非得其要難經所謂三部者寸關尺九候者浮中沉言三部各有浮中沉以為九候也四難云呼出心與肺吸入腎與肝呼吸之間脾也其脈在中浮者陽也心肺俱浮浮而大散者心也浮而短澀者肺也沉者陰也肝腎俱沉牢而長者肝也按之濡舉指來實者腎也脾者中州故其脈在中陰陽法也此蓋既以三部九候分部位又以呼吸浮沉分五臟法至精也心肺在上部出氣由之故呼出屬心肺一呼脈當二至肝腎在下部入氣歸之故吸入屬肝腎一吸脈當二至呼吸之間脾主中宮司出入脈當一至故呼吸定息脈來五至為無病若多一至則有一臟太過若少一至則有一臟不足又以浮中沉分別五臟者言脈在人肌肉之中輕按即見為浮浮為外屬陽心肺應之浮而大散其應在心浮而短澀其應在肺重按乃見為沉沉在裡屬陰肝腎應之牢而長者弦之象屬肝經濡而實者猾之象屬腎經脾者中州故其脈在中是陰陽適中之地也以沉診肝腎浮診心肺中診脾胃此即所謂以呼吸浮沉分五臟也十五難云春脈弦夏脈鉤秋脈毛冬脈石四時皆以胃氣為本四時之變病死生之要會也言弦鉤毛石各見和緩為有胃氣四時之變有太過不及不得胃氣則可以知其病矣此又言五臟四時之主脈皆歸本於胃氣也九難云數者腑也遲者臟也諸陽為熱諸陰為寒數則為熱遲則為寒蓋言腑屬陽故數脈當應腑臟屬陰故遲脈當應臟數則為熱諸陽主氣也遲則為寒諸陰主氣也夫以遲數分臟腑猶未盡然而數則為熱遲則為寒蓋有一定不易之理脈之跳動出於心血之起落屬脈管中血之所主心主火血虛火少則動遲血多火旺則動速脈之精大細虛皆脈管中事當與遲數同斷脈法要辨脈管內是血分脈管外是氣分則診治自有分別矣四難云浮者陽也滑者陽也長者陽也沉者陰也短者陰也澀者陰也各以其經所在名病順逆也須知浮滑長為陽沉短澀為陰據此治病已得其要再分各經以定順逆例如腎脈宜沉而反浮心脈宜浮而反沉則為逆既明脈之定象又言脈無定體因經而分順逆法最細也至於五難云初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也蓋以肺主氣屬皮毛心主血屬經脈脾主生化屬肌肉以及肝主筋腎主髓之類皆以氣化而分非以形而分也至於十九難云男子生於寅為木陽也女子生於申為金陰也故男脈在關上女脈在關下是以男子尺脈恆弱女子尺脈恆盛是其常也蓋言寅為木木生火又火生於寅而性炎上男故脈常在關上而尺脈恆弱也申為金金生水又水生於申故女子脈在關下而尺脈恆盛也言簡而明義精辭確吾故曰學者宜從難經為入門正路也再參諸書盡其奧矣
